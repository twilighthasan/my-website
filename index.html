<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Чайный Мастер</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Playfair+Display:ital,wght@0,400;0,700;1,400&family=Nunito:wght@300;400;600&display=swap');

:root {
–bg: #0f0d0a;
–bg2: #1a1610;
–bg3: #231f18;
–card: #1e1a13;
–border: #3a3020;
–gold: #c9a84c;
–gold2: #e8c97a;
–green: #5a8a4a;
–green2: #7ab865;
–text: #e8dfc8;
–text2: #a89870;
–red: #c0504a;
–blue: #4a7fa0;
–purple: #7a5a9a;
–orange: #c07840;
}

- { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }

body {
background: var(–bg);
color: var(–text);
font-family: ‘Nunito’, sans-serif;
height: 100vh;
overflow: hidden;
display: flex;
flex-direction: column;
}

/* ── HEADER ── */
.header {
padding: 16px 20px 10px;
background: linear-gradient(180deg, #1a1610 0%, transparent 100%);
flex-shrink: 0;
}
.header-top {
display: flex;
align-items: center;
gap: 10px;
margin-bottom: 12px;
}
.logo { font-size: 28px; }
.header-title {
flex: 1;
}
.header-title h1 {
font-family: ‘Playfair Display’, serif;
font-size: 20px;
color: var(–gold2);
line-height: 1.1;
}
.header-title p {
font-size: 11px;
color: var(–text2);
font-weight: 300;
letter-spacing: 0.5px;
}
.level-badge {
background: linear-gradient(135deg, var(–gold), var(–orange));
color: #0f0d0a;
font-size: 10px;
font-weight: 700;
padding: 4px 10px;
border-radius: 20px;
letter-spacing: 0.5px;
text-transform: uppercase;
}

/* ── SEARCH ── */
.search-wrap {
position: relative;
margin-bottom: 2px;
}
.search-icon {
position: absolute;
left: 14px;
top: 50%;
transform: translateY(-50%);
font-size: 16px;
pointer-events: none;
}
.search-input {
width: 100%;
background: var(–bg3);
border: 1px solid var(–border);
border-radius: 14px;
padding: 12px 16px 12px 42px;
color: var(–text);
font-family: ‘Nunito’, sans-serif;
font-size: 15px;
outline: none;
transition: border-color 0.2s;
}
.search-input::placeholder { color: var(–text2); }
.search-input:focus { border-color: var(–gold); }

/* ── TABS ── */
.tabs {
display: flex;
gap: 6px;
padding: 10px 20px 6px;
overflow-x: auto;
scrollbar-width: none;
flex-shrink: 0;
}
.tabs::-webkit-scrollbar { display: none; }
.tab {
flex-shrink: 0;
padding: 7px 14px;
border-radius: 20px;
font-size: 12px;
font-weight: 600;
border: 1px solid var(–border);
background: transparent;
color: var(–text2);
cursor: pointer;
touch-action: manipulation;
transition: all 0.2s;
white-space: nowrap;
}
.tab.active {
background: var(–gold);
color: #0f0d0a;
border-color: var(–gold);
}

/* ── CONTENT ── */
.content {
flex: 1;
overflow-y: auto;
padding: 8px 16px 20px;
scrollbar-width: thin;
scrollbar-color: var(–border) transparent;
}
.content::-webkit-scrollbar { width: 3px; }
.content::-webkit-scrollbar-thumb { background: var(–border); border-radius: 3px; }

/* ── DISEASE CARDS ── */
.section-title {
font-family: ‘Playfair Display’, serif;
font-size: 13px;
color: var(–text2);
letter-spacing: 1px;
text-transform: uppercase;
margin: 8px 0 10px 4px;
}

.disease-grid {
display: grid;
grid-template-columns: 1fr 1fr;
gap: 10px;
margin-bottom: 16px;
}
.disease-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
padding: 14px 12px;
cursor: pointer;
touch-action: manipulation;
transition: all 0.2s;
position: relative;
overflow: hidden;
}
.disease-card::before {
content: ‘’;
position: absolute;
top: 0; left: 0; right: 0;
height: 3px;
border-radius: 16px 16px 0 0;
}
.disease-card.cat-simple::before { background: var(–green); }
.disease-card.cat-digest::before { background: var(–orange); }
.disease-card.cat-nerve::before { background: var(–purple); }
.disease-card.cat-immune::before { background: var(–blue); }
.disease-card.cat-pain::before { background: var(–red); }
.disease-card.cat-skin::before { background: #a0786a; }

.disease-card:active { transform: scale(0.97); }
.disease-icon { font-size: 24px; margin-bottom: 6px; }
.disease-name {
font-size: 13px;
font-weight: 600;
color: var(–text);
line-height: 1.3;
margin-bottom: 4px;
}
.disease-hint {
font-size: 10px;
color: var(–text2);
line-height: 1.3;
}

/* ── DETAIL VIEW ── */
.detail-view { display: none; }
.detail-view.active { display: block; }
.list-view.hidden { display: none; }

.back-btn {
display: flex;
align-items: center;
gap: 8px;
color: var(–gold);
font-size: 14px;
font-weight: 600;
background: none;
border: none;
cursor: pointer;
touch-action: manipulation;
padding: 4px 0 12px 0;
}

.detail-header {
background: linear-gradient(135deg, var(–bg3), var(–card));
border: 1px solid var(–border);
border-radius: 18px;
padding: 18px;
margin-bottom: 16px;
}
.detail-icon { font-size: 36px; margin-bottom: 8px; }
.detail-title {
font-family: ‘Playfair Display’, serif;
font-size: 22px;
color: var(–gold2);
margin-bottom: 6px;
}
.detail-desc {
font-size: 13px;
color: var(–text2);
line-height: 1.6;
}

.teas-title {
font-family: ‘Playfair Display’, serif;
font-size: 16px;
color: var(–text);
margin: 4px 0 12px;
}

.tea-card {
background: var(–card);
border: 1px solid var(–border);
border-radius: 16px;
padding: 16px;
margin-bottom: 12px;
cursor: pointer;
touch-action: manipulation;
transition: all 0.2s;
}
.tea-card:active { transform: scale(0.98); }
.tea-card-header {
display: flex;
align-items: flex-start;
gap: 12px;
margin-bottom: 10px;
}
.tea-emoji { font-size: 28px; flex-shrink: 0; }
.tea-info { flex: 1; }
.tea-name {
font-family: ‘Playfair Display’, serif;
font-size: 16px;
color: var(–gold2);
margin-bottom: 3px;
}
.tea-latin {
font-size: 11px;
font-style: italic;
color: var(–text2);
margin-bottom: 6px;
}
.tea-effect {
font-size: 12px;
color: var(–text);
line-height: 1.5;
}

.tea-recipe {
background: var(–bg3);
border-radius: 12px;
padding: 12px;
margin-top: 10px;
}
.recipe-label {
font-size: 10px;
font-weight: 700;
color: var(–gold);
letter-spacing: 1px;
text-transform: uppercase;
margin-bottom: 8px;
}
.recipe-steps { list-style: none; }
.recipe-step {
display: flex;
gap: 8px;
font-size: 12px;
color: var(–text);
line-height: 1.5;
margin-bottom: 5px;
}
.step-num {
background: var(–gold);
color: #0f0d0a;
width: 18px;
height: 18px;
border-radius: 50%;
display: flex;
align-items: center;
justify-content: center;
font-size: 10px;
font-weight: 700;
flex-shrink: 0;
margin-top: 1px;
}

.tags-row {
display: flex;
flex-wrap: wrap;
gap: 6px;
margin-top: 10px;
}
.tag {
font-size: 10px;
padding: 3px 9px;
border-radius: 10px;
font-weight: 600;
border: 1px solid;
}
.tag-safe { color: var(–green2); border-color: var(–green); background: rgba(90,138,74,0.15); }
.tag-caution { color: #f0c060; border-color: #c09040; background: rgba(192,120,64,0.15); }
.tag-warning { color: var(–red); border-color: var(–red); background: rgba(192,80,74,0.15); }
.tag-time { color: var(–blue); border-color: var(–blue); background: rgba(74,127,160,0.15); }

.warn-box {
background: rgba(192,80,74,0.12);
border: 1px solid rgba(192,80,74,0.3);
border-radius: 12px;
padding: 10px 12px;
font-size: 11px;
color: #e08080;
line-height: 1.5;
margin-top: 10px;
display: flex;
gap: 8px;
align-items: flex-start;
}

/* ── SEARCH RESULTS ── */
.search-results { display: none; }
.search-results.active { display: block; }
.no-results {
text-align: center;
padding: 40px 20px;
color: var(–text2);
font-size: 14px;
}
.no-results .no-icon { font-size: 40px; margin-bottom: 10px; }

/* ── MASTER INFO ── */
.master-card {
background: linear-gradient(135deg, #1a1a0e, #1a160a);
border: 1px solid var(–gold);
border-radius: 18px;
padding: 18px;
margin-bottom: 14px;
position: relative;
overflow: hidden;
}
.master-card::after {
content: ‘茶’;
position: absolute;
right: 16px;
top: 50%;
transform: translateY(-50%);
font-size: 60px;
opacity: 0.07;
font-family: serif;
}
.master-title {
font-family: ‘Playfair Display’, serif;
font-size: 16px;
color: var(–gold2);
margin-bottom: 8px;
}
.master-text {
font-size: 12px;
color: var(–text2);
line-height: 1.7;
}

.tip-row {
background: var(–bg3);
border-radius: 14px;
padding: 12px 14px;
margin-bottom: 10px;
display: flex;
gap: 10px;
align-items: flex-start;
}
.tip-icon { font-size: 20px; flex-shrink: 0; }
.tip-text { font-size: 12px; color: var(–text); line-height: 1.6; }
.tip-text strong { color: var(–gold2); font-weight: 600; }
</style>

</head>
<body>

<div class="header">
  <div class="header-top">
    <div class="logo">🍵</div>
    <div class="header-title">
      <h1>Чайный Мастер</h1>
      <p>Лечебные травы и сборы</p>
    </div>
    <div class="level-badge">Мастер</div>
  </div>
  <div class="search-wrap">
    <span class="search-icon">🔍</span>
    <input class="search-input" type="text" placeholder="Поиск по симптому или траве..." id="searchInput" oninput="onSearch(this.value)">
  </div>
</div>

<div class="tabs" id="tabsBar">
  <div class="tab active" onclick="switchTab('all', this)">Все</div>
  <div class="tab" onclick="switchTab('simple', this)">🌿 Простуда</div>
  <div class="tab" onclick="switchTab('digest', this)">🍊 Пищеварение</div>
  <div class="tab" onclick="switchTab('nerve', this)">🧠 Нервы</div>
  <div class="tab" onclick="switchTab('immune', this)">🛡️ Иммунитет</div>
  <div class="tab" onclick="switchTab('pain', this)">💊 Боль</div>
  <div class="tab" onclick="switchTab('skin', this)">✨ Кожа</div>
  <div class="tab" onclick="switchTab('tips', this)">📖 Основы</div>
</div>

<div class="content" id="mainContent">
  <!-- будет рендерить JS -->
</div>

let currentTab = 'all';
let currentDisease = null;

// ══════════════════════════════════════════════
//  РЕНДЕР
// ══════════════════════════════════════════════

function render() {
  const el = document.getElementById('mainContent');
  if (currentDisease) {
    el.innerHTML = renderDetail(currentDisease);
  } else {
    el.innerHTML = renderList();
  }
}

function renderList() {
  const search = document.getElementById('searchInput').value.trim().toLowerCase();

  if (search.length >= 2) {
    return renderSearch(search);
  }

  if (currentTab === 'tips') {
    return renderTips();
  }

  let diseases = currentTab === 'all' ? DISEASES : DISEASES.filter(d => d.cat === currentTab);

  return `
    <div class="section-title">${diseases.length} состояний в базе</div>
    <div class="disease-grid">
      ${diseases.map(d => `
        <div class="disease-card cat-${d.cat}" onclick="openDisease('${d.id}')">
          <div class="disease-icon">${d.icon}</div>
          <div class="disease-name">${d.name}</div>
          <div class="disease-hint">${d.hint}</div>
        </div>
      `).join('')}
    </div>
  `;
}

function renderSearch(query) {
  const results = [];
  DISEASES.forEach(d => {
    // поиск по болезни
    if (d.name.toLowerCase().includes(query) || d.hint.toLowerCase().includes(query) || d.desc.toLowerCase().includes(query)) {
      results.push({ type: 'disease', d });
      return;
    }
    // поиск по названию чая
    d.teas.forEach(t => {
      if (t.name.toLowerCase().includes(query) || t.latin.toLowerCase().includes(query) || t.effect.toLowerCase().includes(query)) {
        results.push({ type: 'tea', d, t });
      }
    });
  });

  if (!results.length) {
    return `<div class="no-results"><div class="no-icon">🔍</div>Ничего не найдено по запросу «${query}»<br><br><small>Попробуйте: простуда, желудок, стресс, ромашка, имбирь...</small></div>`;
  }

  return `
    <div class="section-title">${results.length} результатов</div>
    <div class="disease-grid">
      ${results.map(r => r.type === 'disease'
        ? `<div class="disease-card cat-${r.d.cat}" onclick="openDisease('${r.d.id}')">
            <div class="disease-icon">${r.d.icon}</div>
            <div class="disease-name">${r.d.name}</div>
            <div class="disease-hint">${r.d.hint}</div>
           </div>`
        : `<div class="disease-card cat-${r.d.cat}" onclick="openDisease('${r.d.id}')">
            <div class="disease-icon">${r.t.emoji}</div>
            <div class="disease-name">${r.t.name}</div>
            <div class="disease-hint">${r.d.name}</div>
           </div>`
      ).join('')}
    </div>
  `;
}

function renderTips() {
  return `
    <div class="master-card">
      <div class="master-title">📖 Основы чайного мастерства</div>
      <div class="master-text">Знание правил заваривания — это половина успеха. Даже самая ценная трава не поможет, если её неправильно приготовить.</div>
    </div>
    ${TIPS.map(t => `
      <div class="tip-row">
        <div class="tip-icon">${t.icon}</div>
        <div class="tip-text">${t.text}</div>
      </div>
    `).join('')}
  `;
}

              ${t.steps.map((s, i) => `
                <li class="recipe-step">
                  <div class="step-num">${i + 1}</div>
                  <span>${s}</span>
                </li>
              `).join('')}
            </ul>
          </div>
          <div class="tags-row">
            ${t.tags.map(tag => {
              if (tag === 'safe') return `<span class="tag tag-safe">✓ Безопасен</span>`;
              if (tag === 'caution') return `<span class="tag tag-caution">⚠ Осторожно</span>`;
              if (tag === 'warning') return `<span class="tag tag-warning">! Предупреждение</span>`;
              return `<span class="tag tag-time">${tag}</span>`;
            }).join('')}
          </div>
          ${t.warn ? `<div class="warn-box"><span>⚠️</span><span>${t.warn.replace('⚠️ ', '')}</span></div>` : ''}
        </div>
      `).join('')}
    </div>
  `;
}

// ══════════════════════════════════════════════
//  ОБРАБОТЧИКИ
// ══════════════════════════════════════════════

function switchTab(tab, el) {
  currentTab = tab;
  currentDisease = null;
  document.querySelectorAll('.tab').forEach(t => t.classList.remove('active'));
  el.classList.add('active');
  render();
  document.getElementById('mainContent').scrollTop = 0;
}

function openDisease(id) {
  currentDisease = DISEASES.find(d => d.id === id);
  render();
  document.getElementById('mainContent').scrollTop = 0;
}

function closeDisease() {
  currentDisease = null;
  render();
  document.getElementById('mainContent').scrollTop = 0;
}

function onSearch(val) {
  if (val.length >= 2) {
    currentDisease = null;
  }
  render();
}

// ══════════════════════════════════════════════
//  ИНИЦИАЛИЗАЦИЯ
// ══════════════════════════════════════════════
render();
</script>
