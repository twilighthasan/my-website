<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>İçecekler — Fiyat Listesi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

- { margin:0; padding:0; box-sizing:border-box; }

:root {
–bg: #f0f4f8;
–card: #ffffff;
–card-hover: #f7f9fb;
–accent: #2d6a4f;
–text: #1a1a2e;
–text-dim: #6b7a8d;
–price: #d4451a;
–border: rgba(0,0,0,0.06);
–shadow: 0 2px 12px rgba(0,0,0,0.06);
–cat-bg: #e8f0e9;
–cat-text: #2d6a4f;
}

body {
font-family: ‘Nunito’, sans-serif;
background: var(–bg);
color: var(–text);
min-height: 100vh;
min-height: 100dvh;
padding: 0;
overflow-x: hidden;
-webkit-tap-highlight-color: transparent;
}

.header {
position: sticky;
top: 0;
z-index: 10;
background: linear-gradient(135deg, #ffffff 0%, #f0f4f8 100%);
padding: 20px 20px 16px;
border-bottom: 1px solid var(–border);
backdrop-filter: blur(10px);
}

.header h1 {
font-size: 22px;
font-weight: 800;
letter-spacing: 0.5px;
color: var(–accent);
text-align: center;
}

.header p {
text-align: center;
color: var(–text-dim);
font-size: 13px;
margin-top: 4px;
}

.list {
padding: 12px 16px 100px;
display: flex;
flex-direction: column;
gap: 8px;
}

.item {
display: flex;
align-items: center;
justify-content: space-between;
background: var(–card);
border: 1px solid var(–border);
border-radius: 14px;
padding: 14px 16px;
box-shadow: var(–shadow);
transition: background 0.2s, transform 0.15s;
animation: fadeUp 0.4s ease both;
}

.item:active {
background: var(–card-hover);
transform: scale(0.98);
}

.item:nth-child(1) { animation-delay: 0.03s; }
.item:nth-child(2) { animation-delay: 0.06s; }
.item:nth-child(3) { animation-delay: 0.09s; }
.item:nth-child(4) { animation-delay: 0.12s; }
.item:nth-child(5) { animation-delay: 0.15s; }
.item:nth-child(6) { animation-delay: 0.18s; }
.item:nth-child(7) { animation-delay: 0.21s; }
.item:nth-child(8) { animation-delay: 0.24s; }
.item:nth-child(9) { animation-delay: 0.27s; }

.item-left {
display: flex;
align-items: center;
gap: 12px;
flex: 1;
min-width: 0;
}

.emoji {
font-size: 26px;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
background: var(–bg);
border-radius: 11px;
flex-shrink: 0;
}

.info {
display: flex;
flex-direction: column;
min-width: 0;
}

.name {
font-size: 15px;
font-weight: 700;
color: var(–text);
white-space: nowrap;
overflow: hidden;
text-overflow: ellipsis;
}

.volume {
font-size: 12px;
color: var(–text-dim);
font-weight: 600;
margin-top: 2px;
}

.price {
font-size: 18px;
font-weight: 800;
color: var(–price);
white-space: nowrap;
padding-left: 12px;
flex-shrink: 0;
}

@keyframes fadeUp {
from {
opacity: 0;
transform: translateY(12px);
}
to {
opacity: 1;
transform: translateY(0);
}
}

.category {
font-size: 11px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1.5px;
color: var(–cat-text);
background: var(–cat-bg);
padding: 6px 12px;
border-radius: 8px;
margin-top: 8px;
display: inline-block;
}
</style>

</head>
<body>

<div class="header">
  <h1>🥤 İçecekler</h1>
  <p>Alara Grand Bazaar</p>
</div>

<div class="list">

  <div class="category">Su</div>
  <div class="item">
    <div class="item-left">
      <div class="emoji">💧</div>
      <div class="info">
        <div class="name">Damla</div>
        <div class="volume">0.5 lt</div>
      </div>
    </div>
    <div class="price">₺15</div>
  </div>

  <div class="category">Kahve</div>
  <div class="item">
    <div class="item-left">
      <div class="emoji">☕</div>
      <div class="info">
        <div class="name">Nescafe Xpress</div>
        <div class="volume">250 ml</div>
      </div>
    </div>
    <div class="price">₺80</div>
  </div>

  <div class="category">Meyve Suyu & Gazlı İçecek</div>
  <div class="item">
    <div class="item-left">
      <div class="emoji">🧃</div>
      <div class="info">
        <div class="name">Capri-Sun</div>
        <div class="volume">200 ml</div>
      </div>
    </div>
    <div class="price">₺30</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🥤</div>
      <div class="info">
        <div class="name">Pepsi</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍊</div>
      <div class="info">
        <div class="name">Yedigün</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍑</div>
      <div class="info">
        <div class="name">Lipton Soğuk Çay</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍑</div>
      <div class="info">
        <div class="name">Lipton</div>
        <div class="volume">1 lt</div>
      </div>
    </div>
    <div class="price">₺70</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">⚡</div>
      <div class="info">
        <div class="name">Sting</div>
        <div class="volume">500 ml</div>
      </div>
    </div>
    <div class="price">₺55</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🥤</div>
      <div class="info">
        <div class="name">Pepsi Cola</div>
        <div class="volume">1 lt</div>
      </div>
    </div>
    <div class="price">₺70</div>
  </div>

</div>

</body>
</html>
