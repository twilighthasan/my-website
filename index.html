<!DOCTYPE html>
<html lang="ru">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>King Kong 3D</title>
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }
        body { background: #0a0a0a; overflow: hidden; }
        canvas { display: block; }
        #info {
            position: absolute;
            top: 15px;
            left: 50%;
            transform: translateX(-50%);
            color: #fff;
            font-family: Arial, sans-serif;
            font-size: 14px;
            background: rgba(0,0,0,0.5);
            padding: 8px 16px;
            border-radius: 20px;
            pointer-events: none;
        }
    </style>
</head>
<body>
    <div id="info">King Kong 3D — Перетащи мышью для вращения</div>
    <script src="https://cdnjs.cloudflare.com/ajax/libs/three.js/r128/three.min.js"></script>
    <script>
        const scene = new THREE.Scene();
        scene.background = new THREE.Color(0x0a0a0a);
        scene.fog = new THREE.Fog(0x0a0a0a, 30, 80);

        const camera = new THREE.PerspectiveCamera(45, window.innerWidth / window.innerHeight, 0.1, 200);
        camera.position.set(0, 6, 22);
        camera.lookAt(0, 4, 0);

        const renderer = new THREE.WebGLRenderer({ antialias: true });
        renderer.setSize(window.innerWidth, window.innerHeight);
        renderer.shadowMap.enabled = true;
        renderer.shadowMap.type = THREE.PCFSoftShadowMap;
        document.body.appendChild(renderer.domElement);

        const ambientLight = new THREE.AmbientLight(0x222222);
        scene.add(ambientLight);

        const dirLight = new THREE.DirectionalLight(0xffeedd, 1.2);
        dirLight.position.set(10, 20, 10);
        dirLight.castShadow = true;
        dirLight.shadow.mapSize.width = 2048;
        dirLight.shadow.mapSize.height = 2048;
        scene.add(dirLight);

        const rimLight = new THREE.DirectionalLight(0x4488ff, 0.4);
        rimLight.position.set(-10, 5, -10);
        scene.add(rimLight);

        const pointLight = new THREE.PointLight(0xff6600, 0.8, 30);
        pointLight.position.set(0, 10, 5);
        scene.add(pointLight);

        const furMat = new THREE.MeshLambertMaterial({ color: 0x1a0f00 });
        const darkFurMat = new THREE.MeshLambertMaterial({ color: 0x0d0800 });
        const skinMat = new THREE.MeshLambertMaterial({ color: 0x2a1a0a });
        const eyeWhiteMat = new THREE.MeshLambertMaterial({ color: 0xffeecc });
        const eyePupilMat = new THREE.MeshLambertMaterial({ color: 0x111111 });
        const noseMat = new THREE.MeshLambertMaterial({ color: 0x1a0d00 });
        const toothMat = new THREE.MeshLambertMaterial({ color: 0xffffee });
        const groundMat = new THREE.MeshLambertMaterial({ color: 0x111111 });

        function addMesh(geo, mat, px, py, pz, rx, ry, rz, parent) {
            const m = new THREE.Mesh(geo, mat);
            m.position.set(px, py, pz);
            if (rx !== undefined) m.rotation.set(rx, ry, rz);
            m.castShadow = true;
            m.receiveShadow = true;
            (parent || scene).add(m);
            return m;
        }

        const kong = new THREE.Group();
        scene.add(kong);

        // ТЕЛО
        const bodyGeo = new THREE.SphereGeometry(2.2, 16, 12);
        bodyGeo.scale(1, 1.25, 0.95);
        addMesh(bodyGeo, furMat, 0, 3.5, 0, 0, 0, 0, kong);

        const chestGeo = new THREE.SphereGeometry(1.3, 12, 10);
        chestGeo.scale(1, 1.1, 0.6);
        addMesh(chestGeo, skinMat, 0, 3.6, 1.6, 0, 0, 0, kong);

        // ГОЛОВА
        const head = new THREE.Group();
        head.position.set(0, 6.4, 0);
        kong.add(head);

        const skullGeo = new THREE.SphereGeometry(1.5, 16, 12);
        skullGeo.scale(1, 0.9, 1);
        addMesh(skullGeo, furMat, 0, 0, 0, 0, 0, 0, head);

        const browGeo = new THREE.SphereGeometry(1.52, 16, 6, 0, Math.PI * 2, 0, 0.5);
        addMesh(browGeo, darkFurMat, 0, 0.3, 0.3, -0.2, 0, 0, head);

        const muzzleGeo = new THREE.SphereGeometry(0.85, 12, 10);
        muzzleGeo.scale(1, 0.7, 1.2);
        addMesh(muzzleGeo, skinMat, 0, -0.35, 1.1, 0, 0, 0, head);

        addMesh(new THREE.SphereGeometry(0.18, 8, 6), noseMat, -0.22, -0.1, 1.85, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.18, 8, 6), noseMat, 0.22, -0.1, 1.85, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.28, 8, 6), noseMat, 0, -0.05, 1.88, 0, 0, 0, head);

        addMesh(new THREE.SphereGeometry(0.22, 10, 8), eyeWhiteMat, -0.55, 0.25, 1.32, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.22, 10, 8), eyeWhiteMat, 0.55, 0.25, 1.32, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.13, 8, 6), eyePupilMat, -0.55, 0.25, 1.52, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.13, 8, 6), eyePupilMat, 0.55, 0.25, 1.52, 0, 0, 0, head);

        const jawGeo = new THREE.SphereGeometry(0.7, 10, 8);
        jawGeo.scale(1.1, 0.5, 1.0);
        addMesh(jawGeo, skinMat, 0, -0.7, 1.0, 0, 0, 0, head);

        addMesh(new THREE.ConeGeometry(0.09, 0.35, 6), toothMat, -0.3, -0.55, 1.55, 0.3, 0, 0.1, head);
        addMesh(new THREE.ConeGeometry(0.09, 0.35, 6), toothMat, 0.3, -0.55, 1.55, 0.3, 0, -0.1, head);
        addMesh(new THREE.ConeGeometry(0.07, 0.28, 6), toothMat, -0.5, -0.45, 1.4, 0.25, 0, 0.15, head);
        addMesh(new THREE.ConeGeometry(0.07, 0.28, 6), toothMat, 0.5, -0.45, 1.4, 0.25, 0, -0.15, head);

        addMesh(new THREE.SphereGeometry(0.3, 8, 6), furMat, -1.45, 0.5, 0, 0, 0, 0, head);
        addMesh(new THREE.SphereGeometry(0.3, 8, 6), furMat, 1.45, 0.5, 0, 0, 0, 0, head);

        // ШЕЯ
        addMesh(new THREE.CylinderGeometry(0.9, 1.2, 1.0, 10), furMat, 0, 5.5, 0, 0, 0, 0, kong);

        // РУКИ
        const leftArm = new THREE.Group();
        leftArm.position.set(-2.3, 4.8, 0);
        leftArm.rotation.z = 0.6;
        kong.add(leftArm);

        addMesh(new THREE.CylinderGeometry(0.55, 0.65, 2.0, 10), furMat, 0, -1.0, 0, 0, 0, 0, leftArm);
        addMesh(new THREE.CylinderGeometry(0.4, 0.52, 1.8, 10), furMat, 0, -2.9, 0, 0, 0, 0, leftArm);
        addMesh(new THREE.SphereGeometry(0.55, 10, 8), furMat, 0, -4.0, 0, 0, 0, 0, leftArm);

        const rightArm = new THREE.Group();
        rightArm.position.set(2.3, 4.8, 0);
        rightArm.rotation.z = -1.1;
        kong.add(rightArm);

        addMesh(new THREE.CylinderGeometry(0.55, 0.65, 2.0, 10), furMat, 0, -1.0, 0, 0, 0, 0, rightArm);
        addMesh(new THREE.CylinderGeometry(0.4, 0.52, 1.8, 10), furMat, 0, -2.9, 0, 0, 0, 0, rightArm);
        addMesh(new THREE.SphereGeometry(0.55, 10, 8), furMat, 0, -4.0, 0, 0, 0, 0, rightArm);

        // БЁДРА
        addMesh(new THREE.SphereGeometry(1.8, 12, 10), furMat, 0, 1.8, 0, 0, 0, 0, kong);

        // НОГИ
        const leftLeg = new THREE.Group();
        leftLeg.position.set(-1.0, 1.2, 0);
        leftLeg.rotation.z = 0.1;
        kong.add(leftLeg);

        addMesh(new THREE.CylinderGeometry(0.75, 0.65, 2.0, 10), furMat, 0, -1.0, 0, 0, 0, 0, leftLeg);
        addMesh(new THREE.CylinderGeometry(0.55, 0.6, 1.8, 10), furMat, 0, -2.9, 0, 0, 0, 0, leftLeg);
        const footGeo = new THREE.SphereGeometry(0.7, 10, 8);
        footGeo.scale(1.3, 0.5, 1.6);
        addMesh(footGeo, darkFurMat, 0, -4.0, 0.3, 0, 0, 0, leftLeg);

        const rightLeg = new THREE.Group();
        rightLeg.position.set(1.0, 1.2, 0);
        rightLeg.rotation.z = -0.1;
        kong.add(rightLeg);

        addMesh(new THREE.CylinderGeometry(0.75, 0.65, 2.0, 10), furMat, 0, -1.0, 0, 0, 0, 0, rightLeg);
        addMesh(new THREE.CylinderGeometry(0.55, 0.6, 1.8, 10), furMat, 0, -2.9, 0, 0, 0, 0, rightLeg);
        const footGeo2 = new THREE.SphereGeometry(0.7, 10, 8);
        footGeo2.scale(1.3, 0.5, 1.6);
        addMesh(footGeo2, darkFurMat, 0, -4.0, 0.3, 0, 0, 0, rightLeg);

        kong.position.y = 3;

        // ЗЕМЛЯ
        const groundGeo = new THREE.PlaneGeometry(60, 60);
        const ground = new THREE.Mesh(groundGeo, groundMat);
        ground.rotation.x = -Math.PI / 2;
        ground.receiveShadow = true;
        scene.add(ground);

        // ЗВЁЗДЫ
        const starGeo = new THREE.BufferGeometry();
        const starVerts = [];
        for (let i = 0; i < 2000; i++) {
            starVerts.push((Math.random() - 0.5) * 200, Math.random() * 80 + 5, (Math.random() - 0.5) * 200);
        }
        starGeo.setAttribute('position', new THREE.Float32BufferAttribute(starVerts, 3));
        const starMat = new THREE.PointsMaterial({ color: 0xffffff, size: 0.15 });
        scene.add(new THREE.Points(starGeo, starMat));

        // УПРАВЛЕНИЕ
        let isDragging = false;
        let prevMouse = { x: 0, y: 0 };
        let rotY = 0, rotX = 0.1;

        renderer.domElement.addEventListener('mousedown', e => { isDragging = true; prevMouse = { x: e.clientX, y: e.clientY }; });
        renderer.domElement.addEventListener('mouseup', () => { isDragging = false; });
        renderer.domElement.addEventListener('mousemove', e => {
            if (!isDragging) return;
            rotY += (e.clientX - prevMouse.x) * 0.01;
            rotX += (e.clientY - prevMouse.y) * 0.005;
            rotX = Math.max(-0.5, Math.min(0.8, rotX));
            prevMouse = { x: e.clientX, y: e.clientY };
        });

        renderer.domElement.addEventListener('touchstart', e => { isDragging = true; prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY }; });
        renderer.domElement.addEventListener('touchend', () => { isDragging = false; });
        renderer.domElement.addEventListener('touchmove', e => {
            if (!isDragging) return;
            rotY += (e.touches[0].clientX - prevMouse.x) * 0.01;
            prevMouse = { x: e.touches[0].clientX, y: e.touches[0].clientY };
        });

        window.addEventListener('resize', () => {
            camera.aspect = window.innerWidth / window.innerHeight;
            camera.updateProjectionMatrix();
            renderer.setSize(window.innerWidth, window.innerHeight);
        });

        // АНИМАЦИЯ
        let t = 0;
        function animate() {
            requestAnimationFrame(animate);
            t += 0.02;

            if (!isDragging) rotY += 0.004;

            kong.rotation.y = rotY;
            kong.rotation.x = rotX;
            kong.scale.y = 1 + Math.sin(t * 0.8) * 0.015;

            rightArm.rotation.z = -1.1 + Math.sin(t) * 0.15;
            leftArm.rotation.z = 0.6 + Math.sin(t + 1) * 0.1;

            camera.position.y = 6 + Math.sin(t * 0.3) * 0.5;

            renderer.render(scene, camera);
        }
        animate();
    </script>
</body>
</html>
