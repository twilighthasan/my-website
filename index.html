<!DOCTYPE html>

<html lang="tr">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>İçecekler — Fiyat Listesi</title>
<style>
  @import url('https://fonts.googleapis.com/css2?family=Nunito:wght@400;600;700;800&display=swap');

- { margin:0; padding:0; box-sizing:border-box; }

body {
font-family: ‘Nunito’, sans-serif;
background: #f5f5f5;
color: #1a1a2e;
min-height: 100vh;
min-height: 100dvh;
padding: 0;
overflow-x: hidden;
-webkit-tap-highlight-color: transparent;
}

.header {
position: sticky;
top: 0;
z-index: 10;
background: #fff;
padding: 20px 20px 16px;
border-bottom: 2px solid #e0e0e0;
}

.header h1 {
font-size: 22px;
font-weight: 800;
color: #2d6a4f;
text-align: center;
}

.header p {
text-align: center;
color: #888;
font-size: 13px;
margin-top: 4px;
}

.list {
padding: 12px 16px 100px;
display: flex;
flex-direction: column;
gap: 0;
}

.category {
font-size: 12px;
font-weight: 700;
text-transform: uppercase;
letter-spacing: 1.5px;
color: #2d6a4f;
background: #e8f0e9;
padding: 8px 14px;
border-radius: 8px;
margin-top: 14px;
margin-bottom: 6px;
}

.item {
display: flex;
align-items: center;
justify-content: space-between;
background: #fff;
border: 1.5px solid #d8d8d8;
border-bottom: none;
padding: 14px 16px;
}

.item:first-of-type,
.category + .item {
border-top-left-radius: 12px;
border-top-right-radius: 12px;
}

.item:last-child,
.item.last-in-group {
border-bottom: 1.5px solid #d8d8d8;
border-bottom-left-radius: 12px;
border-bottom-right-radius: 12px;
}

.item-left {
display: flex;
align-items: center;
gap: 12px;
flex: 1;
min-width: 0;
}

.emoji {
font-size: 26px;
width: 42px;
height: 42px;
display: flex;
align-items: center;
justify-content: center;
background: #f5f5f5;
border-radius: 10px;
flex-shrink: 0;
}

.info {
display: flex;
flex-direction: column;
min-width: 0;
}

.name {
font-size: 15px;
font-weight: 700;
color: #1a1a2e;
}

.volume {
font-size: 12px;
color: #888;
font-weight: 600;
margin-top: 2px;
}

.price {
font-size: 18px;
font-weight: 800;
color: #d4451a;
white-space: nowrap;
padding-left: 12px;
flex-shrink: 0;
}

.separator {
height: 0;
border: none;
border-top: 1px solid #e8e8e8;
margin: 0 12px;
background: #fff;
}
</style>

</head>
<body>

<div class="header">
  <h1>🥤 İçecekler</h1>
  <p>Alara Grand Bazaar</p>
</div>

<div class="list">

  <div class="category">Su</div>
  <div class="item last-in-group" style="border-radius:12px; border-bottom:1.5px solid #d8d8d8;">
    <div class="item-left">
      <div class="emoji">💧</div>
      <div class="info">
        <div class="name">Damla</div>
        <div class="volume">0.5 lt</div>
      </div>
    </div>
    <div class="price">₺15</div>
  </div>

  <div class="category">Kahve</div>
  <div class="item last-in-group" style="border-radius:12px; border-bottom:1.5px solid #d8d8d8;">
    <div class="item-left">
      <div class="emoji">☕</div>
      <div class="info">
        <div class="name">Nescafe Xpress</div>
        <div class="volume">250 ml</div>
      </div>
    </div>
    <div class="price">₺80</div>
  </div>

  <div class="category">Meyve Suyu & Gazlı İçecek</div>

  <div class="item" style="border-top-left-radius:12px; border-top-right-radius:12px;">
    <div class="item-left">
      <div class="emoji">🧃</div>
      <div class="info">
        <div class="name">Capri-Sun</div>
        <div class="volume">200 ml</div>
      </div>
    </div>
    <div class="price">₺30</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🥤</div>
      <div class="info">
        <div class="name">Pepsi</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍊</div>
      <div class="info">
        <div class="name">Yedigün</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍑</div>
      <div class="info">
        <div class="name">Lipton Soğuk Çay</div>
        <div class="volume">330 ml</div>
      </div>
    </div>
    <div class="price">₺60</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">🍑</div>
      <div class="info">
        <div class="name">Lipton</div>
        <div class="volume">1 lt</div>
      </div>
    </div>
    <div class="price">₺70</div>
  </div>

  <div class="item">
    <div class="item-left">
      <div class="emoji">⚡</div>
      <div class="info">
        <div class="name">Sting</div>
        <div class="volume">500 ml</div>
      </div>
    </div>
    <div class="price">₺55</div>
  </div>

  <div class="item last-in-group" style="border-bottom:1.5px solid #d8d8d8; border-bottom-left-radius:12px; border-bottom-right-radius:12px;">
    <div class="item-left">
      <div class="emoji">🥤</div>
      <div class="info">
        <div class="name">Pepsi Cola</div>
        <div class="volume">1 lt</div>
      </div>
    </div>
    <div class="price">₺70</div>
  </div>

</div>

</body>
</html>
