<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>Чайный Гуру — Справочник лечебных чаёв</title>
<style>
@import url('https://fonts.googleapis.com/css2?family=Playfair+Display:wght@400;600;700&family=Source+Sans+3:wght@300;400;500;600&display=swap');

*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
:root{
–bg:#0f0f0f;–card:#1a1a1a;–card2:#222;–accent:#c8a45a;–accent2:#e8c96a;
–green:#4a9e6e;–green2:#2d6b46;–red:#c45c5c;–text:#e8e4dc;–text2:#a09a8e;
–radius:16px;–shadow:0 4px 24px rgba(0,0,0,.4);
}
html,body{height:100%;font-family:‘Source Sans 3’,sans-serif;background:var(–bg);color:var(–text);overflow:hidden;touch-action:manipulation}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative}

/* Header */
.header{padding:12px 16px 8px;text-align:center;flex-shrink:0;background:linear-gradient(180deg,#1a1612 0%,var(–bg) 100%);border-bottom:1px solid #2a2520}
.header h1{font-family:‘Playfair Display’,serif;font-size:22px;color:var(–accent);letter-spacing:1px;margin-bottom:2px}
.header .sub{font-size:11px;color:var(–text2);letter-spacing:3px;text-transform:uppercase}

/* Search */
.search-wrap{padding:8px 16px;flex-shrink:0}
.search-box{display:flex;align-items:center;background:var(–card);border:1px solid #333;border-radius:12px;padding:0 12px;transition:border .2s}
.search-box:focus-within{border-color:var(–accent)}
.search-box svg{width:18px;height:18px;stroke:var(–text2);flex-shrink:0}
.search-box input{flex:1;background:none;border:none;color:var(–text);font-size:15px;padding:10px 8px;outline:none;font-family:inherit}
.search-box input::placeholder{color:#555}
.search-clear{background:none;border:none;color:var(–text2);font-size:18px;padding:4px 2px;cursor:pointer;display:none}

/* Tabs */
.tabs{display:flex;padding:4px 16px 0;gap:4px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:7px 14px;border-radius:20px;font-size:12px;font-weight:500;white-space:nowrap;border:1px solid #333;background:var(–card);color:var(–text2);cursor:pointer;transition:all .2s;flex-shrink:0}
.tab.active{background:var(–accent);color:#111;border-color:var(–accent);font-weight:600}

/* Content */
.content{flex:1;overflow-y:auto;padding:10px 16px 90px;-webkit-overflow-scrolling:touch;scroll-behavior:smooth}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:#333;border-radius:3px}

/* Tea cards */
.tea-card{background:var(–card);border-radius:var(–radius);padding:14px 16px;margin-bottom:10px;border:1px solid #2a2a2a;cursor:pointer;transition:all .2s;position:relative;overflow:hidden}
.tea-card::before{content:’’;position:absolute;top:0;left:0;width:4px;height:100%;border-radius:4px 0 0 4px}
.tea-card:active{transform:scale(.98)}
.tea-card .emoji{font-size:28px;margin-bottom:6px}
.tea-card .name{font-family:‘Playfair Display’,serif;font-size:17px;color:var(–accent2);margin-bottom:3px}
.tea-card .form-tag{display:inline-block;font-size:10px;padding:2px 8px;border-radius:8px;background:#2a2520;color:var(–accent);margin-bottom:6px;text-transform:uppercase;letter-spacing:1px}
.tea-card .desc{font-size:13px;color:var(–text2);line-height:1.5;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tea-card .tags{display:flex;flex-wrap:wrap;gap:4px;margin-top:8px}
.tea-card .tag{font-size:10px;padding:3px 8px;border-radius:6px;background:rgba(74,158,110,.15);color:var(–green);border:1px solid rgba(74,158,110,.2)}

/* Category colors */
.cat-single::before{background:#c8a45a}
.cat-powder::before{background:#e07040}
.cat-mix::before{background:#5a9ec8}
.cat-spice::before{background:#c45ca0}

/* Detail view */
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.85);z-index:100;display:none;justify-content:center;align-items:flex-end;backdrop-filter:blur(6px);-webkit-backdrop-filter:blur(6px)}
.detail-overlay.show{display:flex}
.detail-sheet{width:100%;max-width:500px;max-height:88vh;background:var(–card);border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-handle{width:40px;height:4px;background:#444;border-radius:4px;margin:10px auto}
.detail-header{padding:4px 20px 16px;text-align:center;border-bottom:1px solid #2a2a2a}
.detail-header .emoji{font-size:44px;margin-bottom:6px}
.detail-header h2{font-family:‘Playfair Display’,serif;font-size:22px;color:var(–accent2)}
.detail-header .form{font-size:12px;color:var(–text2);margin-top:2px}
.detail-body{padding:16px 20px 32px}
.detail-section{margin-bottom:18px}
.detail-section h3{font-size:13px;text-transform:uppercase;letter-spacing:2px;color:var(–accent);margin-bottom:8px;font-family:‘Playfair Display’,serif}
.detail-section p,.detail-section li{font-size:14px;line-height:1.7;color:var(–text)}
.detail-section ul{list-style:none;padding:0}
.detail-section ul li{padding:4px 0 4px 18px;position:relative}
.detail-section ul li::before{content:’•’;position:absolute;left:0;color:var(–accent)}
.benefit-list li::before{content:‘✦’;color:var(–green)!important}
.warn-list li::before{content:‘⚠’;color:var(–red)!important;font-size:12px}
.brew-box{background:var(–card2);border-radius:12px;padding:14px;border:1px solid #333}
.brew-row{display:flex;justify-content:space-between;padding:5px 0;font-size:13px;border-bottom:1px solid #2a2a2a}
.brew-row:last-child{border:none}
.brew-label{color:var(–text2)}
.brew-val{color:var(–accent2);font-weight:500}
.sell-tip{background:linear-gradient(135deg,#2a2520,#1a1612);border-radius:12px;padding:14px;border:1px solid #3a3020;font-size:13px;line-height:1.7;color:var(–accent2)}
.sell-tip strong{color:var(–accent)}
.close-btn{position:sticky;bottom:16px;display:block;width:calc(100% - 40px);margin:16px auto 0;padding:14px;background:var(–accent);color:#111;border:none;border-radius:12px;font-size:15px;font-weight:600;font-family:inherit;cursor:pointer}

/* Symptom mode */
.symptom-grid{display:grid;grid-template-columns:1fr 1fr;gap:8px}
.symptom-btn{background:var(–card);border:1px solid #333;border-radius:12px;padding:12px 10px;text-align:center;cursor:pointer;transition:all .2s}
.symptom-btn:active{transform:scale(.96)}
.symptom-btn.active{border-color:var(–green);background:rgba(74,158,110,.1)}
.symptom-btn .sym-emoji{font-size:24px;margin-bottom:4px}
.symptom-btn .sym-name{font-size:12px;color:var(–text);font-weight:500}

/* Empty state */
.empty{text-align:center;padding:40px 20px;color:var(–text2)}
.empty .em-icon{font-size:48px;margin-bottom:12px}
.empty p{font-size:14px;line-height:1.6}

/* Bottom nav */
.bottom-nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:linear-gradient(0deg,var(–bg) 60%,transparent);padding:12px 16px 20px;gap:8px}
.nav-btn{flex:1;padding:12px 8px;border-radius:14px;border:1px solid #333;background:var(–card);color:var(–text2);font-size:11px;font-family:inherit;font-weight:500;cursor:pointer;text-align:center;transition:all .2s}
.nav-btn.active{background:var(–accent);color:#111;border-color:var(–accent);font-weight:600}
.nav-btn .nav-icon{font-size:18px;display:block;margin-bottom:2px}

/* Disclaimer */
.disclaimer{font-size:10px;color:#555;text-align:center;padding:12px;line-height:1.5;border-top:1px solid #222;margin-top:8px}
</style>

</head>
<body>
<div id="app">
  <div class="header">
    <h1>☕ Чайный Гуру</h1>
    <div class="sub">Справочник лечебных чаёв</div>
  </div>
  <div class="search-wrap">
    <div class="search-box">
      <svg viewBox="0 0 24 24" fill="none" stroke-width="2"><circle cx="11" cy="11" r="8"/><path d="M21 21l-4.35-4.35"/></svg>
      <input id="searchInput" type="text" placeholder="Поиск по чаю или симптому...">
      <button class="search-clear" id="clearBtn" onclick="clearSearch()">✕</button>
    </div>
  </div>
  <div class="tabs" id="tabs"></div>
  <div class="content" id="content"></div>
  <div class="bottom-nav">
    <button class="nav-btn active" onclick="setMode('catalog')"><span class="nav-icon">🍵</span>Каталог</button>
    <button class="nav-btn" onclick="setMode('symptoms')"><span class="nav-icon">💊</span>По симптому</button>
    <button class="nav-btn" onclick="setMode('tips')"><span class="nav-icon">💡</span>Продавцу</button>
  </div>
</div>
<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detailSheet"></div>
</div>

// ===================== STATE =====================
let currentMode = 'catalog';
let currentCat = 'all';
let searchQuery = '';
let activeSymptoms = [];

// ===================== RENDER =====================
function setMode(mode) {
  currentMode = mode;
  document.querySelectorAll('.nav-btn').forEach((b,i) => {
    b.classList.toggle('active', ['catalog','symptoms','tips'][i] === mode);
  });
  render();
}

function render() {
  const content = document.getElementById('content');
  const tabs = document.getElementById('tabs');
  
  if (currentMode === 'catalog') {
    tabs.innerHTML = ['all','single','powder','mix','spice'].map(c => 
      `<div class="tab ${currentCat===c?'active':''}" onclick="setCat('${c}')">${
        {all:'Все',single:'Моно',powder:'Порошки',mix:'Миксы',spice:'С приправами'}[c]
      }</div>`
    ).join('');
    tabs.style.display = 'flex';
    renderCatalog(content);
  } else if (currentMode === 'symptoms') {
    tabs.style.display = 'none';
    renderSymptoms(content);
  } else {
    tabs.style.display = 'none';
    renderTips(content);
  }
}

function setCat(c) {
  currentCat = c;
  render();
}

function renderCatalog(el) {
  let teas = TEAS;
  if (currentCat !== 'all') teas = teas.filter(t => t.cat === currentCat);
  if (searchQuery) {
    const q = searchQuery.toLowerCase();
    teas = teas.filter(t => 
      t.name.toLowerCase().includes(q) || 
      t.desc.toLowerCase().includes(q) ||
      t.symptoms.some(s => s.includes(q)) ||
      t.benefits.some(b => b.toLowerCase().includes(q))
    );
  }
  if (!teas.length) {
    el.innerHTML = `<div class="empty"><div class="em-icon">🔍</div><p>Ничего не найдено.<br>Попробуй другой запрос.</p></div>`;
    return;
  }
  el.innerHTML = teas.map(t => `
    <div class="tea-card cat-${t.cat}" onclick="openDetail(${t.id})">
      <div class="emoji">${t.emoji}</div>
      <div class="name">${t.name}</div>
      <div class="form-tag">${t.form}</div>
      <div class="desc">${t.desc}</div>
      <div class="tags">${t.symptoms.slice(0,4).map(s=>`<span class="tag">${s}</span>`).join('')}</div>
    </div>
  `).join('') + '<div class="disclaimer">⚠️ Чай — дополнение к лечению, не замена. При серьёзных заболеваниях консультируйтесь с врачом.</div>';
}

function renderSymptoms(el) {
  let html = '<div class="symptom-grid">';
  html += SYMPTOMS.map(s => `
    <div class="symptom-btn ${activeSymptoms.includes(s.id)?'active':''}" onclick="toggleSymptom('${s.id}')">
      <div class="sym-emoji">${s.emoji}</div>
      <div class="sym-name">${s.name}</div>
    </div>
  `).join('');
  html += '</div>';
  
  if (activeSymptoms.length) {
    const matched = TEAS.filter(t => t.symptoms.some(s => activeSymptoms.includes(s)))
      .sort((a,b) => {
        const aMatch = a.symptoms.filter(s => activeSymptoms.includes(s)).length;
        const bMatch = b.symptoms.filter(s => activeSymptoms.includes(s)).length;
        return bMatch - aMatch;
      });
    if (matched.length) {
      html += '<div style="margin-top:14px">';
      html += matched.map(t => {
        const matchCount = t.symptoms.filter(s => activeSymptoms.includes(s)).length;
        return `
        <div class="tea-card cat-${t.cat}" onclick="openDetail(${t.id})">
          <div style="display:flex;justify-content:space-between;align-items:center">
            <div><span style="font-size:24px;margin-right:8px">${t.emoji}</span><span class="name" style="font-size:15px">${t.name}</span></div>
            <div style="font-size:11px;color:var(--green);background:rgba(74,158,110,.15);padding:3px 8px;border-radius:8px">${matchCount} совпад.</div>
          </div>
          <div class="desc" style="margin-top:6px">${t.desc}</div>
        </div>`;
      }).join('');
      html += '</div>';
    }
  } else {
    html += '<div class="empty" style="padding:20px"><p>Выбери симптом — подберу подходящий чай</p></div>';
  }
  el.innerHTML = html;
}

function toggleSymptom(id) {
  const idx = activeSymptoms.indexOf(id);
  if (idx > -1) activeSymptoms.splice(idx,1);
  else activeSymptoms.push(id);
  render();
}

function renderTips(el) {
  el.innerHTML = SELL_TIPS.map(section => `
    <div class="tea-card" style="cursor:default">
      <div style="font-size:24px;margin-bottom:6px">${section.emoji}</div>
      <div class="name" style="margin-bottom:10px">${section.title}</div>
      ${section.tips.map(t => `<div style="font-size:13px;color:var(--text);padding:6px 0 6px 16px;position:relative;line-height:1.6;border-bottom:1px solid #2a2a2a"><span style="position:absolute;left:0;color:var(--accent)">→</span>${t}</div>`).join('')}
    </div>
  `).join('') + '<div class="disclaimer">Помни: ты продавец, не врач. Рекомендуй, не назначай!</div>';
}

}

function closeDetail(e) {
  if (e && e.target !== document.getElementById('detailOverlay')) return;
  document.getElementById('detailOverlay').classList.remove('show');
}

// ===================== SEARCH =====================
document.getElementById('searchInput').addEventListener('input', function(e) {
  searchQuery = e.target.value.trim();
  document.getElementById('clearBtn').style.display = searchQuery ? 'block' : 'none';
  if (currentMode === 'catalog') render();
});

function clearSearch() {
  document.getElementById('searchInput').value = '';
  searchQuery = '';
  document.getElementById('clearBtn').style.display = 'none';
  render();
}

// Prevent zoom on double-tap
document.addEventListener('dblclick', e => e.preventDefault());

// Init
render();
</script>

</body>
</html>
