<!DOCTYPE html>
<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
<title>Паук и Паутина</title>
<style>
  * { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
  body {
    background: #060810;
    overflow: hidden; width: 100vw; height: 100vh;
    font-family: 'Georgia', serif;
    touch-action: none;
  }
  canvas { display:block; touch-action:none; }
  #hint-box {
    position: fixed; bottom: 130px; left: 50%; transform: translateX(-50%);
    background: rgba(0,0,0,0.82); border: 1px solid rgba(180,255,180,0.35);
    border-radius: 14px; padding: 10px 20px; color: #c8f0c8;
    font-size: 13px; text-align: center; max-width: 310px;
    opacity: 0; transition: opacity 0.4s ease; pointer-events: none;
    z-index: 20; line-height: 1.6; white-space: pre-line;
    box-shadow: 0 0 20px rgba(0,200,80,0.1);
  }
  #hint-box.visible { opacity: 1; }
  #controls {
    position: fixed; bottom: 28px; left: 0; right: 0;
    display: flex; justify-content: center; gap: 16px;
    z-index: 10;
  }
  .btn {
    width: 64px; height: 64px; border-radius: 50%;
    border: 1.5px solid rgba(180,220,180,0.4);
    background: rgba(0,25,0,0.75);
    color: #c8f0c8; font-size: 24px;
    display: flex; align-items: center; justify-content: center;
    cursor: pointer; user-select: none;
    box-shadow: 0 0 14px rgba(80,200,80,0.15), inset 0 1px 0 rgba(255,255,255,0.05);
    -webkit-tap-highlight-color: transparent;
    transition: background 0.12s, transform 0.08s;
  }
  .btn:active { background: rgba(0,70,0,0.95); transform: scale(0.88); }
  #btn-jump { background: rgba(0,15,35,0.8); border-color: rgba(100,160,255,0.45); color: #a8d4ff; }
  #btn-jump:active { background: rgba(0,40,90,0.95); }
  #btn-web.active { background: rgba(0,55,0,0.95); border-color: rgba(100,255,100,0.7); }
  #status {
    position: fixed; top: 16px; left: 16px; right: 16px;
    display: flex; justify-content: space-between;
    pointer-events: none; z-index: 10;
    color: rgba(180,220,180,0.7); font-size: 12px; letter-spacing: 0.5px;
  }
</style>
</head>
<body>
<canvas id="c"></canvas>
<div id="status">
  <span>🕸 нитей: <span id="wc">0</span></span>
  <span id="mode-lbl">ползти</span>
</div>
<div id="hint-box"></div>
<div id="controls">
  <div class="btn" id="btn-left">◀</div>
  <div class="btn" id="btn-jump">↑</div>
  <div class="btn" id="btn-right">▶</div>
  <div class="btn" id="btn-web" style="font-size:18px;">🕸</div>
</div>
<script>
const canvas = document.getElementById('c');
const ctx = canvas.getContext('2d');
canvas.width = window.innerWidth;
canvas.height = window.innerHeight;
const W = canvas.width, H = canvas.height;

// ── HINT ──────────────────────────────────────────
const hintEl = document.getElementById('hint-box');
let hintTmr = null;
function hint(msg, dur=3200) {
  hintEl.textContent = msg;
  hintEl.classList.add('visible');
  clearTimeout(hintTmr);
  hintTmr = setTimeout(() => hintEl.classList.remove('visible'), dur);
}

// ── STARS (pre-generated) ─────────────────────────
const stars = Array.from({length:60}, () => ({
  x: Math.random()*W, y: Math.random()*H*0.55,
  r: 0.5 + Math.random()*1.2,
  alpha: 0.3 + Math.random()*0.5,
  twinkle: Math.random()*Math.PI*2
}));

// ── TREE GEOMETRY ─────────────────────────────────
const TX = W * 0.5;
const TRUNK_TOP = H * 0.22;
const TRUNK_BOT = H;
const TRUNK_W = 22;

const BRANCHES = [
  {
    sx: TX, sy: H*0.30,
    ex: TX - W*0.32, ey: H*0.14, w: 13,
    subs: [
      {ex: TX-W*0.38, ey:H*0.07, w:7},
      {ex: TX-W*0.26, ey:H*0.08, w:6}
    ]
  },
  {
    sx: TX, sy: H*0.40,
    ex: TX + W*0.30, ey: H*0.18, w: 13,
    subs: [
      {ex: TX+W*0.36, ey:H*0.09, w:7},
      {ex: TX+W*0.24, ey:H*0.10, w:6}
    ]
  }
];

// Build all anchor snapping points
function linePts(x1,y1,x2,y2,n=10){
  const pts=[];
  for(let i=0;i<=n;i++){const t=i/n;pts.push({x:x1+(x2-x1)*t,y:y1+(y2-y1)*t});}
  return pts;
}
let ANCHORS=[];
// trunk
ANCHORS.push(...linePts(TX, TRUNK_TOP, TX, H*0.80, 14));
// branches
BRANCHES.forEach(b=>{
  ANCHORS.push(...linePts(b.sx,b.sy,b.ex,b.ey,12));
  b.subs.forEach(s=>ANCHORS.push(...linePts(b.ex,b.ey,s.ex,s.ey,6)));
});

function nearestAnchor(px,py,maxD=70){
  let best=null,bd=maxD;
  ANCHORS.forEach(p=>{
    const d=Math.hypot(p.x-px,p.y-py);
    if(d<bd){bd=d;best=p;}
  });
  return best;
}

// ── SPIDER ────────────────────────────────────────
const sp = {
  x: TX, y: H*0.52,
  vx:0, vy:0,
  onTree: true,
  treeType: 'trunk',  // 'trunk'|'b0'|'b1'|'ground'
  treeT: 0.45,
  jumping: false,
  facing: 1,
  legPhase: 0,
};

// ── WEB STATE ────────────────────────────────────
let webMode = false;
let anchorA = null;      // first chosen anchor
let silkLine = null;     // animating silk {x1,y1,x2,y2,tx,ty}
let webs = [];           // {x1,y1,x2,y2,sag,age}
let dewdrops = [];       // {x,y,r,alpha}
let webCount = 0;

function setWebCount(n){ webCount=n; document.getElementById('wc').textContent=n; }

// ── INPUT ─────────────────────────────────────────
const keys={left:false,right:false,jump:false};
function btnHold(id,key){
  const el=document.getElementById(id);
  ['touchstart','mousedown'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=true;},{passive:false}));
  ['touchend','touchcancel','mouseup','mouseleave'].forEach(ev=>el.addEventListener(ev,e=>{e.preventDefault();keys[key]=false;},{passive:false}));
}
btnHold('btn-left','left');
btnHold('btn-right','right');
btnHold('btn-jump','jump');

document.getElementById('btn-web').addEventListener('click', e=>{
  e.preventDefault();
  webMode=!webMode;
  anchorA=null; silkLine=null;
  document.getElementById('btn-web').classList.toggle('active', webMode);
  document.getElementById('mode-lbl').textContent = webMode ? '🕸 плести' : 'ползти';
  if(webMode) hint('🕷 Коснись точки на дереве — начало нити\nЗатем вторая точка — конец нити',3500);
  else hint('Режим: ползти',1200);
});

canvas.addEventListener('touchstart', onTap, {passive:false});
canvas.addEventListener('mousedown', onTap);
function onTap(e){
  if(!webMode) return;
  e.preventDefault();
  const cx = e.touches ? e.touches[0].clientX : e.clientX;
  const cy = e.touches ? e.touches[0].clientY : e.clientY;
  const pt = nearestAnchor(cx,cy);
  if(!pt){ hint('⚠️ Прикрепить нить можно\nтолько к стволу или ветке',2200); return; }

  if(!anchorA){
    anchorA = pt;
    silkLine = {x1:sp.x,y1:sp.y, x2:sp.x,y2:sp.y, tx:pt.x, ty:pt.y};
    hint(rnd([
      '✓ Начало закреплено!\nВыбери вторую точку крепления',
      '📍 Первая точка выбрана!\nТяни нить к другой ветке',
      '🕷 Отлично! Теперь укажи конец нити'
    ]),2800);
  } else {
    if(Math.hypot(pt.x-anchorA.x,pt.y-anchorA.y)<8){
      hint('Выбери другую точку!',1500); return;
    }
    const sag = computeSag(anchorA, pt);
    webs.push({x1:anchorA.x,y1:anchorA.y,x2:pt.x,y2:pt.y,sag,age:0});
    spawnDewdrops(anchorA,pt,sag);
    setWebCount(webCount+1);
    anchorA=null; silkLine=null;
    hint(rnd([
      '✨ Нить натянута!\nДля паутины-колеса крепи от центра к краям',
      '🕸 Красиво! Добавь поперечные нити — паутина станет ловушкой',
      '💡 Совет: нити пересекающиеся по спирали — классическая паутина',
      '🌿 Ещё нить между ветками даст опору для всей сети'
    ]),3000);
  }
}
function rnd(arr){return arr[Math.floor(Math.random()*arr.length)];}
function computeSag(a,b){
  const d=Math.hypot(b.x-a.x,b.y-a.y);
  return d*0.15 + 8;
}
function spawnDewdrops(a,b,sag){
  const n=Math.floor(Math.hypot(b.x-a.x,b.y-a.y)/30)+2;
  for(let i=0;i<n;i++){
    const t=Math.random();
    const mx=(a.x+b.x)/2, my=(a.y+b.y)/2+sag;
    const x=quadB(a.x,mx,b.x,t);
    const y=quadB(a.y,my,b.y,t);
    dewdrops.push({x,y,r:1.2+Math.random()*1.2,alpha:0.55+Math.random()*0.35,web:webs.length});
  }
}
function quadB(p0,p1,p2,t){return (1-t)*(1-t)*p0+2*(1-t)*t*p1+t*t*p2;}

// ── SURFACE PATHS ─────────────────────────────────
function trunkPath(n=30){return linePts(TX,TRUNK_TOP,TX,H*0.85,n);}
function branchPath(bi,n=16){
  const b=BRANCHES[bi];
  const pts=linePts(b.sx,b.sy,b.ex,b.ey,n);
  b.subs.forEach(s=>pts.push(...linePts(b.ex,b.ey,s.ex,s.ey,6)));
  return pts;
}

function clamp(v,a,b){return Math.max(a,Math.min(b,v));}
function ptOnPath(path,t){
  const idx=clamp(t*(path.length-1),0,path.length-1);
  const i=Math.floor(idx),f=idx-i;
  if(i>=path.length-1) return path[path.length-1];
  return {x:path[i].x+(path[i+1].x-path[i].x)*f, y:path[i].y+(path[i+1].y-path[i].y)*f};
}

// ── UPDATE ────────────────────────────────────────
const GRAVITY = 0.42;
const JUMP_POWER = -13;
const MOVE = 2.0;

function update(){
  sp.legPhase += 0.14;

  if(sp.onTree && !sp.jumping){
    if(sp.treeType==='ground'){
      if(keys.left){sp.x-=MOVE;sp.facing=-1;}
      if(keys.right){sp.x+=MOVE;sp.facing=1;}
      if(keys.jump){ doJump(sp.facing*1.8, JUMP_POWER); }
    } else {
      const path = sp.treeType==='trunk' ? trunkPath() : branchPath(sp.treeType==='b0'?0:1);
      const step = 1/(path.length-1)*0.6;
      if(keys.left){sp.treeT=clamp(sp.treeT-step,0,1);sp.facing=-1;}
      if(keys.right){sp.treeT=clamp(sp.treeT+step,0,1);sp.facing=1;}
      const pt=ptOnPath(path,sp.treeT);
      sp.x=pt.x; sp.y=pt.y;
      if(keys.jump){ doJump(sp.facing*2.5, JUMP_POWER*0.88); }
    }
  } else {
    sp.vy += GRAVITY;
    sp.x += sp.vx;
    sp.y += sp.vy;
    sp.vx *= 0.985;
    sp.x = clamp(sp.x, 14, W-14);
    if(sp.y >= H-35){ land('ground'); sp.y=H-35; return; }
    checkTreeLanding();
  }

  // Silk animation
  if(silkLine){
    const dx=silkLine.tx-silkLine.x2, dy=silkLine.ty-silkLine.y2;
    const d=Math.hypot(dx,dy);
    const spd=9;
    if(d<spd){silkLine.x2=silkLine.tx;silkLine.y2=silkLine.ty;}
    else{silkLine.x2+=dx/d*spd;silkLine.y2+=dy/d*spd;}
  }

  // Web aging
  webs.forEach(w=>{ if(w.age<1) w.age=Math.min(1,w.age+0.04); });
}

function doJump(vx,vy){
  sp.vx=vx; sp.vy=vy;
  sp.onTree=false; sp.jumping=true;
}

function checkTreeLanding(){
  if(sp.vy<-2) return; // still going up fast
  // trunk
  const tp=trunkPath(30);
  for(let i=0;i<tp.length;i++){
    const p=tp[i];
    if(Math.abs(sp.x-p.x)<22 && Math.abs(sp.y-p.y)<18){
      land('trunk'); sp.treeT=i/(tp.length-1); sp.x=p.x; sp.y=p.y; return;
    }
  }
  // branches
  for(let bi=0;bi<2;bi++){
    const bp=branchPath(bi,16);
    for(let i=0;i<bp.length;i++){
      const p=bp[i];
      if(Math.abs(sp.x-p.x)<22 && Math.abs(sp.y-p.y)<18){
        land('b'+bi); sp.treeT=i/(bp.length-1); sp.x=p.x; sp.y=p.y; return;
      }
    }
  }
}

function land(type){
  sp.onTree=true; sp.treeType=type;
  sp.jumping=false; sp.vy=0; sp.vx*=0.5;
}

// ── DRAW ─────────────────────────────────────────
function drawBg(){
  // Sky gradient
  const sg=ctx.createLinearGradient(0,0,0,H);
  sg.addColorStop(0,'#06080f');
  sg.addColorStop(0.5,'#0a1008');
  sg.addColorStop(1,'#120e00');
  ctx.fillStyle=sg; ctx.fillRect(0,0,W,H);

  // Moon glow
  const mg=ctx.createRadialGradient(W*0.78,H*0.07,8,W*0.78,H*0.07,130);
  mg.addColorStop(0,'rgba(255,255,220,0.18)');
  mg.addColorStop(1,'rgba(0,0,0,0)');
  ctx.fillStyle=mg; ctx.fillRect(0,0,W,H);

  // Moon
  ctx.save();
  ctx.shadowColor='rgba(255,255,200,0.6)';
  ctx.shadowBlur=20;
  ctx.fillStyle='rgba(255,253,225,0.92)';
  ctx.beginPath(); ctx.arc(W*0.78,H*0.07,20,0,Math.PI*2); ctx.fill();
  // Moon craters
  ctx.fillStyle='rgba(220,218,200,0.3)';
  [[W*0.78-6,H*0.065,4],[W*0.78+7,H*0.08,3],[W*0.78+2,H*0.055,2.5]].forEach(([cx,cy,r])=>{
    ctx.beginPath(); ctx.arc(cx,cy,r,0,Math.PI*2); ctx.fill();
  });
  ctx.restore();

  // Stars
  const t=Date.now()*0.001;
  stars.forEach(s=>{
    const a=s.alpha*(0.7+0.3*Math.sin(t*0.8+s.twinkle));
    ctx.fillStyle=`rgba(255,255,255,${a})`;
    ctx.beginPath(); ctx.arc(s.x,s.y,s.r,0,Math.PI*2); ctx.fill();
  });

  // Ground
  const gg=ctx.createLinearGradient(0,H-55,0,H);
  gg.addColorStop(0,'#1c1500');
  gg.addColorStop(1,'#0a0900');
  ctx.fillStyle=gg; ctx.fillRect(0,H-55,W,55);

  // Grass blades
  const gt=Date.now()*0.0008;
  for(let gx=4;gx<W;gx+=7){
    const sway=Math.sin(gt+gx*0.09)*2.5;
    const gh=12+Math.sin(gx*0.3)*5;
    ctx.strokeStyle=`rgba(${20+Math.floor(Math.sin(gx)*8)},${55+Math.floor(Math.cos(gx)*12)},5,0.6)`;
    ctx.lineWidth=1.2;
    ctx.beginPath();
    ctx.moveTo(gx,H-55);
    ctx.quadraticCurveTo(gx+sway,H-55-gh*0.5,gx+sway*1.4,H-55-gh);
    ctx.stroke();
  }
}

function drawTree(){
  // Trunk
  const tg=ctx.createLinearGradient(TX-TRUNK_W,0,TX+TRUNK_W,0);
  tg.addColorStop(0,'#110a02');
  tg.addColorStop(0.35,'#3a1e0a');
  tg.addColorStop(0.65,'#2c1608');
  tg.addColorStop(1,'#0e0701');
  ctx.fillStyle=tg;
  ctx.beginPath();
  ctx.moveTo(TX-TRUNK_W*1.6,TRUNK_BOT);
  ctx.bezierCurveTo(TX-TRUNK_W,TRUNK_BOT*0.75,TX-TRUNK_W*0.6,TRUNK_TOP+80,TX-TRUNK_W*0.4,TRUNK_TOP);
  ctx.lineTo(TX+TRUNK_W*0.4,TRUNK_TOP);
  ctx.bezierCurveTo(TX+TRUNK_W*0.6,TRUNK_TOP+80,TX+TRUNK_W,TRUNK_BOT*0.75,TX+TRUNK_W*1.6,TRUNK_BOT);
  ctx.closePath(); ctx.fill();

  // Bark grain
  ctx.strokeStyle='rgba(0,0,0,0.25)'; ctx.lineWidth=1;
  for(let i=1;i<9;i++){
    const yy=TRUNK_TOP+(TRUNK_BOT-TRUNK_TOP)*(i/9);
    ctx.beginPath();
    ctx.moveTo(TX-TRUNK_W*0.4,yy);
    ctx.bezierCurveTo(TX-4,yy+14,TX+3,yy+10,TX+TRUNK_W*0.35,yy+3);
    ctx.stroke();
  }

  // Branches
  BRANCHES.forEach((b,bi)=>{
    // Main branch
    ctx.strokeStyle='#261208';
    ctx.lineWidth=b.w; ctx.lineCap='round';
    ctx.beginPath();
    ctx.moveTo(b.sx,b.sy);
    const cpx=(b.sx+b.ex)/2+(bi===0?-18:18);
    const cpy=(b.sy+b.ey)/2-18;
    ctx.quadraticCurveTo(cpx,cpy,b.ex,b.ey);
    ctx.stroke();

    // Sub-branches
    b.subs.forEach(s=>{
      ctx.lineWidth=s.w;
      ctx.beginPath();
      ctx.moveTo(b.ex,b.ey);
      ctx.quadraticCurveTo((b.ex+s.ex)/2+(bi===0?-8:8),(b.ey+s.ey)/2-8,s.ex,s.ey);
      ctx.stroke();
      drawLeafCluster(s.ex,s.ey,6,bi);
    });
    drawLeafCluster(b.ex,b.ey,9,bi);
  });
}

function drawLeafCluster(cx,cy,n,bi){
  ctx.save();
  const t=Date.now()*0.0005;
  for(let i=0;i<n;i++){
    const angle=(i/n)*Math.PI*2+(bi===0?0.2:-0.2)+Math.sin(t+i*0.7)*0.05;
    const r=16+i*5;
    const lx=cx+Math.cos(angle)*r*(0.6+Math.random()*0.2);
    const ly=cy+Math.sin(angle)*r*0.45;
    const green=50+i*7;
    ctx.fillStyle=`rgba(15,${green},8,${0.55+i*0.04})`;
    ctx.beginPath();
    ctx.ellipse(lx,ly,10+i*2,5.5+i,angle+0.3,0,Math.PI*2);
    ctx.fill();
  }
  ctx.restore();
}

function drawWebs(){
  webs.forEach(w=>{
    ctx.save();
    ctx.globalAlpha=w.age*0.72;
    ctx.strokeStyle='rgba(215,240,215,0.9)';
    ctx.lineWidth=0.85;
    ctx.shadowColor='rgba(150,255,150,0.25)';
    ctx.shadowBlur=4;
    const mx=(w.x1+w.x2)/2, my=(w.y1+w.y2)/2+w.sag;
    ctx.beginPath();
    ctx.moveTo(w.x1,w.y1);
    ctx.quadraticCurveTo(mx,my,w.x2,w.y2);
    ctx.stroke();
    ctx.restore();
  });
  // Dewdrops
  dewdrops.forEach(d=>{
    if(d.web>=webs.length) return;
    const w=webs[d.web];
    if(!w || w.age<0.5) return;
    ctx.save();
    ctx.globalAlpha=d.alpha*w.age;
    const dg=ctx.createRadialGradient(d.x-d.r*0.3,d.y-d.r*0.3,0,d.x,d.y,d.r);
    dg.addColorStop(0,'rgba(255,255,255,0.8)');
    dg.addColorStop(0.6,'rgba(180,230,255,0.5)');
    dg.addColorStop(1,'rgba(100,180,255,0.1)');
    ctx.fillStyle=dg;
    ctx.beginPath(); ctx.arc(d.x,d.y,d.r,0,Math.PI*2); ctx.fill();
    ctx.restore();
  });
}

function drawSilk(){
  if(!silkLine) return;
  ctx.save();
  ctx.strokeStyle='rgba(200,255,180,0.45)';
  ctx.lineWidth=0.7;
  ctx.setLineDash([5,5]);
  ctx.beginPath();
  ctx.moveTo(silkLine.x1,silkLine.y1);
  ctx.lineTo(silkLine.x2,silkLine.y2);
  ctx.stroke();
  ctx.restore();
}

function drawAnchors(){
  if(!webMode) return;
  const t=Date.now()*0.005;
  ANCHORS.forEach(p=>{
    const isSelected = anchorA && Math.abs(anchorA.x-p.x)<2 && Math.abs(anchorA.y-p.y)<2;
    const pulse=0.3+0.25*Math.sin(t+p.x*0.05);
    ctx.save();
    if(isSelected){
      ctx.shadowColor='rgba(255,220,50,0.8)';
      ctx.shadowBlur=10;
      ctx.fillStyle=`rgba(255,220,50,${0.85+pulse*0.1})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,5.5,0,Math.PI*2); ctx.fill();
    } else {
      ctx.fillStyle=`rgba(140,255,140,${pulse})`;
      ctx.beginPath(); ctx.arc(p.x,p.y,3.5,0,Math.PI*2); ctx.fill();
    }
    ctx.restore();
  });
}

function drawSpider(){
  ctx.save();
  ctx.translate(sp.x, sp.y);
  ctx.scale(sp.facing,1);

  const lp=sp.legPhase;
  const moving=keys.left||keys.right;

  // Silk thread from abdomen when on tree
  if(sp.onTree && sp.treeType!=='ground'){
    ctx.strokeStyle='rgba(180,240,180,0.2)';
    ctx.lineWidth=0.6;
    ctx.setLineDash([]);
    ctx.beginPath(); ctx.moveTo(0,8); ctx.lineTo(0,32); ctx.stroke();
  }

  // Draw 8 legs
  ctx.strokeStyle='rgba(15,8,2,0.9)';
  ctx.lineWidth=1.6; ctx.lineCap='round';
  const legs=[
    [-11,-3,-28,-16+Math.sin(lp+(moving?0:0))*5],
    [-10,-1,-24,-7+Math.sin(lp+0.6)*(moving?4:1)],
    [-9, 2, -22, 12+Math.sin(lp+1.2)*(moving?4:1)],
    [-7, 5, -20, 22+Math.sin(lp+1.8)*(moving?4:1)],
    [11,-3, 28,-16+Math.sin(lp+Math.PI)*5],
    [10,-1, 24,-7+Math.sin(lp+Math.PI+0.6)*(moving?4:1)],
    [9,  2, 22, 12+Math.sin(lp+Math.PI+1.2)*(moving?4:1)],
    [7,  5, 20, 22+Math.sin(lp+Math.PI+1.8)*(moving?4:1)],
  ];
  legs.forEach(([bx,by,ex,ey])=>{
    const mx=(bx+ex)/2, my=(by+ey)/2-7;
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.quadraticCurveTo(mx,my,ex,ey); ctx.stroke();
  });

  // Abdomen (larger oval)
  ctx.fillStyle='#0e0600';
  ctx.beginPath(); ctx.ellipse(-5,2,9,7,-0.15,0,Math.PI*2); ctx.fill();
  // Abdomen marking (orange hourglass shape)
  ctx.fillStyle='#cc2200';
  ctx.beginPath(); ctx.ellipse(-5,2,5,3,-0.15,0,Math.PI*2); ctx.fill();
  ctx.fillStyle='rgba(255,80,0,0.6)';
  ctx.beginPath(); ctx.ellipse(-5,2,2.5,1.2,-0.15,0,Math.PI*2); ctx.fill();

  // Cephalothorax
  ctx.fillStyle='#0a0500';
  ctx.beginPath(); ctx.ellipse(5,0,7,5.5,0.1,0,Math.PI*2); ctx.fill();

  // Pedipalps (small front limbs)
  ctx.strokeStyle='rgba(20,10,2,0.8)'; ctx.lineWidth=1.2;
  [[5,-2,12,-8],[5,1,12,6]].forEach(([bx,by,ex,ey])=>{
    ctx.beginPath(); ctx.moveTo(bx,by); ctx.lineTo(ex,ey); ctx.stroke();
  });

  // Eyes (4 pairs simplified to 4 dots)
  ctx.fillStyle='rgba(255,50,0,0.95)';
  [[3,-2],[6,-2],[3,1],[6,1]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.arc(ex,ey,1.3,0,Math.PI*2); ctx.fill();
  });
  // Eye shine
  ctx.fillStyle='rgba(255,200,200,0.6)';
  [[3,-2.3],[6,-2.3]].forEach(([ex,ey])=>{
    ctx.beginPath(); ctx.arc(ex,ey,0.5,0,Math.PI*2); ctx.fill();
  });

  ctx.restore();
}

// ── LOOP ─────────────────────────────────────────
function loop(){
  ctx.clearRect(0,0,W,H);
  drawBg();
  drawTree();
  drawWebs();
  drawSilk();
  drawAnchors();
  drawSpider();
  update();
  requestAnimationFrame(loop);
}

// ── INIT HINTS ───────────────────────────────────
setTimeout(()=>hint('🕷 Добро пожаловать!\n◀ ▶ — движение    ↑ — прыжок\n🕸 — режим плетения паутины',4500),600);
setTimeout(()=>hint('💡 Паук может ползти по стволу и ветвям\nПрыгай на них с земли!',3500),7000);

loop();
</script>
