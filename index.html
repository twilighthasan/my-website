<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<meta name="color-scheme" content="dark">
<meta name="theme-color" content="#0f0f0f">
<title>Чайный Гуру — Справочник лечебных чаёв</title>
<style>
*{margin:0;padding:0;box-sizing:border-box;-webkit-tap-highlight-color:transparent}
html,body{
  height:100%;
  font-family:-apple-system,BlinkMacSystemFont,'Segoe UI',Roboto,'Helvetica Neue',Arial,sans-serif;
  background:#0f0f0f !important;
  color:#e8e4dc !important;
  overflow:hidden;
  touch-action:manipulation;
  -webkit-text-size-adjust:100%;
}
#app{height:100%;display:flex;flex-direction:column;max-width:500px;margin:0 auto;position:relative;background:#0f0f0f}
.header{padding:14px 16px 10px;text-align:center;flex-shrink:0;background:#151210;border-bottom:1px solid #2a2520}
.header h1{font-size:24px;font-weight:700;color:#c8a45a;letter-spacing:1px;margin-bottom:2px}
.header .sub{font-size:11px;color:#a09a8e;letter-spacing:3px;text-transform:uppercase}
.search-wrap{padding:10px 16px;flex-shrink:0}
.search-box{display:flex;align-items:center;background:#1a1a1a;border:1px solid #444;border-radius:12px;padding:0 14px}
.search-box:focus-within{border-color:#c8a45a}
.search-box svg{width:20px;height:20px;stroke:#888;flex-shrink:0}
.search-box input{flex:1;background:transparent;border:none;color:#e8e4dc;font-size:16px;padding:12px 10px;outline:none;font-family:inherit;-webkit-appearance:none;appearance:none}
.search-box input::placeholder{color:#666}
.search-clear{background:none;border:none;color:#888;font-size:22px;padding:4px;cursor:pointer;display:none;line-height:1}
.tabs{display:flex;padding:6px 16px 2px;gap:6px;flex-shrink:0;overflow-x:auto;-webkit-overflow-scrolling:touch;scrollbar-width:none}
.tabs::-webkit-scrollbar{display:none}
.tab{padding:9px 16px;border-radius:22px;font-size:14px;font-weight:600;white-space:nowrap;border:1px solid #444;background:#1a1a1a;color:#a09a8e;cursor:pointer;flex-shrink:0}
.tab.active{background:#c8a45a;color:#111;border-color:#c8a45a}
.content{flex:1;overflow-y:auto;padding:12px 16px 100px;-webkit-overflow-scrolling:touch}
.content::-webkit-scrollbar{width:3px}
.content::-webkit-scrollbar-thumb{background:#444;border-radius:3px}
.tea-card{background:#1a1a1a;border-radius:16px;padding:16px 18px;margin-bottom:12px;border:1px solid #333;cursor:pointer;position:relative;overflow:hidden}
.tea-card::before{content:'';position:absolute;top:0;left:0;width:5px;height:100%;border-radius:5px 0 0 5px}
.tea-card:active{opacity:.85}
.tea-card .emoji{font-size:32px;margin-bottom:8px;display:block}
.tea-card .name{font-size:20px;font-weight:700;color:#e8c96a;margin-bottom:4px}
.tea-card .form-tag{display:inline-block;font-size:11px;font-weight:700;padding:3px 10px;border-radius:8px;background:#2a2520;color:#c8a45a;margin-bottom:8px;text-transform:uppercase;letter-spacing:1.5px}
.tea-card .desc{font-size:15px;color:#a09a8e;line-height:1.6;display:-webkit-box;-webkit-line-clamp:2;-webkit-box-orient:vertical;overflow:hidden}
.tea-card .tags{display:flex;flex-wrap:wrap;gap:6px;margin-top:10px}
.tea-card .tag{font-size:12px;font-weight:500;padding:4px 10px;border-radius:8px;background:rgba(74,158,110,.15);color:#4a9e6e;border:1px solid rgba(74,158,110,.25)}
.cat-single::before{background:#c8a45a}
.cat-powder::before{background:#e07040}
.cat-mix::before{background:#5a9ec8}
.cat-spice::before{background:#c45ca0}
.detail-overlay{position:fixed;top:0;left:0;right:0;bottom:0;background:rgba(0,0,0,.92);z-index:1000;display:none;justify-content:center;align-items:flex-end}
.detail-overlay.show{display:flex}
.detail-sheet{width:100%;max-width:500px;max-height:90vh;background:#1a1a1a;border-radius:20px 20px 0 0;overflow-y:auto;-webkit-overflow-scrolling:touch;animation:slideUp .3s ease}
@keyframes slideUp{from{transform:translateY(100%)}to{transform:translateY(0)}}
.detail-handle{width:40px;height:5px;background:#555;border-radius:4px;margin:12px auto}
.detail-header{padding:6px 20px 18px;text-align:center;border-bottom:1px solid #333}
.detail-header .emoji{font-size:52px;margin-bottom:8px;display:block}
.detail-header h2{font-size:26px;font-weight:700;color:#e8c96a}
.detail-header .form{font-size:14px;color:#a09a8e;margin-top:4px}
.detail-body{padding:20px 20px 36px}
.detail-section{margin-bottom:22px}
.detail-section h3{font-size:14px;font-weight:700;text-transform:uppercase;letter-spacing:2.5px;color:#c8a45a;margin-bottom:10px}
.detail-section p{font-size:16px;line-height:1.7;color:#e8e4dc}
.detail-section ul{list-style:none;padding:0}
.detail-section ul li{padding:6px 0 6px 22px;position:relative;font-size:16px;line-height:1.6;color:#e8e4dc}
.detail-section ul li::before{content:'•';position:absolute;left:0;color:#c8a45a;font-size:18px}
.benefit-list li::before{content:'✦';color:#4a9e6e !important;font-size:14px}
.warn-list li::before{content:'⚠';color:#c45c5c !important;font-size:14px}
.brew-box{background:#252525;border-radius:14px;padding:16px;border:1px solid #444}
.brew-row{display:flex;justify-content:space-between;align-items:center;padding:8px 0;font-size:15px;border-bottom:1px solid #333}
.brew-row:last-child{border:none}
.brew-label{color:#a09a8e;font-weight:500}
.brew-val{color:#e8c96a;font-weight:600;text-align:right;max-width:55%}
.sell-tip{background:#1f1a12;border-radius:14px;padding:16px;border:1px solid #3a3020;font-size:15px;line-height:1.7;color:#e8c96a}
.close-btn{position:sticky;bottom:16px;display:block;width:100%;margin:20px 0 0;padding:16px;background:#c8a45a;color:#111;border:none;border-radius:14px;font-size:17px;font-weight:700;font-family:inherit;cursor:pointer}
.symptom-grid{display:grid;grid-template-columns:1fr 1fr;gap:10px}
.symptom-btn{background:#1a1a1a;border:1px solid #444;border-radius:14px;padding:14px 10px;text-align:center;cursor:pointer}
.symptom-btn:active{opacity:.8}
.symptom-btn.active{border-color:#4a9e6e;background:rgba(74,158,110,.12)}
.symptom-btn .sym-emoji{font-size:28px;margin-bottom:6px;display:block}
.symptom-btn .sym-name{font-size:14px;color:#e8e4dc;font-weight:600}
.empty{text-align:center;padding:40px 20px;color:#a09a8e}
.empty .em-icon{font-size:52px;margin-bottom:14px}
.empty p{font-size:16px;line-height:1.7}
.bottom-nav{position:absolute;bottom:0;left:0;right:0;display:flex;background:linear-gradient(0deg,#0f0f0f 70%,transparent);padding:14px 16px 24px;gap:8px}
.nav-btn{flex:1;padding:12px 8px;border-radius:14px;border:1px solid #444;background:#1a1a1a;color:#a09a8e;font-size:13px;font-family:inherit;font-weight:600;cursor:pointer;text-align:center}
.nav-btn.active{background:#c8a45a;color:#111;border-color:#c8a45a}
.nav-btn .nav-icon{font-size:20px;display:block;margin-bottom:3px}
.disclaimer{font-size:12px;color:#666;text-align:center;padding:14px;line-height:1.6;border-top:1px solid #2a2a2a;margin-top:10px}
.tip-card{background:#1a1a1a;border-radius:16px;padding:16px 18px;margin-bottom:12px;border:1px solid #333}
.tip-emoji{font-size:28px;margin-bottom:8px;display:block}
.tip-title{font-size:19px;font-weight:700;color:#e8c96a;margin-bottom:12px}
.tip-item{font-size:15px;color:#e8e4dc;padding:8px 0 8px 22px;position:relative;line-height:1.7;border-bottom:1px solid #2a2a2a}
.tip-item:last-child{border:none}
.tip-item::before{content:'→';position:absolute;left:0;color:#c8a45a;font-weight:700}
.match-card{background:#1a1a1a;border-radius:14px;padding:14px 16px;margin-bottom:10px;border:1px solid #333;cursor:pointer}
.match-card:active{opacity:.85}
.match-top{display:flex;justify-content:space-between;align-items:center}
.match-name{font-size:18px;font-weight:700;color:#e8c96a}
.match-badge{font-size:12px;font-weight:600;color:#4a9e6e;background:rgba(74,158,110,.15);padding:4px 10px;border-radius:10px}
.match-desc{font-size:14px;color:#a09a8e;margin-top:8px;line-height:1.5}
</style>
</head>
<body>
<div id="app">
  <div class="header">
    <h1>☕ Чайный Гуру</h1>
    <div class="sub">Справочник лечебных чаёв</div>
  </div>
  <div class="search-wrap">
    <div class="search-box">

  <div class="content" id="content"></div>
  <div class="bottom-nav">

<div class="detail-overlay" id="detailOverlay" onclick="closeDetail(event)">
  <div class="detail-sheet" id="detailSheet"></div>
</div>

const SYMPTOMS=[{id:“простуда”,name:“Простуда / Грипп”,emoji:“🤧”},{id:“пищеварение”,name:“Пищеварение”,emoji:“🫃”},{id:“иммунитет”,name:“Иммунитет”,emoji:“🛡️”},{id:“давление”,name:“Давление”,emoji:“💓”},{id:“стресс”,name:“Стресс / Сон”,emoji:“😴”},{id:“боль”,name:“Боль / Суставы”,emoji:“🦴”},{id:“дыхание”,name:“Дыхание / Нос”,emoji:“👃”},{id:“запор”,name:“Запор / Вздутие”,emoji:“💨”},{id:“сахар”,name:“Сахар / Диабет”,emoji:“🩸”},{id:“кожа”,name:“Кожа / Красота”,emoji:“✨”},{id:“энергия”,name:“Энергия / Тонус”,emoji:“⚡”},{id:“детокс”,name:“Детокс / Отёки”,emoji:“💧”}];

const SELL_TIPS=[{title:“Золотые правила продажи”,emoji:“🏆”,tips:[“Слушай клиента — спроси «Что вас беспокоит?» перед предложением”,“Расскажи историю, а не характеристики — люди покупают эмоции”,“Дай понюхать или попробовать — сенсорный опыт продаёт”,“Комбо: «К этому чаю идеально подходит этот мёд»”,“Происхождение: «Этот шалфей из Средиземноморья»”]},{title:“Фразы-триггеры”,emoji:“💬”,tips:[”«Натуральная альтернатива таблеткам»”,”«Его пьют в дорогих спа-отелях»”,”«Исследования подтверждают»”,”«Один пакет на месяц — дешевле кофе»”,”«Идеальный подарок»”,”«Попробуйте — не понравится, подберу другое»”]},{title:“Подбор чая клиенту”,emoji:“🎯”,tips:[“Турист с простудой → Эвкалипт-Гранат-Мята или Имбирь”,“Женщина 40+ → Шалфей или Детокс-микс”,“Спортсмен → Энерджи Чай или Имбирь-Куркума”,“Пожилая пара → Корица (сахар) + Каркаде (давление)”,“Молодая мама → Успокаивающий сбор”,“Подарок → Универсальный Микс”]},{title:“Апселл и кросс-селл”,emoji:“📈”,tips:[“К любому чаю → мёд”,“Набор 3 чаёв: утренний, дневной, вечерний”,“Комплементарный: «К имбирю идеально корица»”,“Сезонные наборы”,“Подарки — красивая обёртка + карточка”]},{title:“Важно помнить!”,emoji:“⚠️”,tips:[“Ты НЕ врач — не ставь диагнозы”,”«Помогает при…» а не «лечит от…»”,“Спрашивай об аллергиях и беременности”,“Серьёзные лекарства → консультация врача”,“Чай — дополнение, не замена”]}];

let currentMode=‘catalog’,currentCat=‘all’,searchQuery=’’,activeSymptoms=[];

function setMode(m){currentMode=m;document.querySelectorAll(’.nav-btn’).forEach((b,i)=>{b.classList.toggle(‘active’,[‘catalog’,‘symptoms’,‘tips’][i]===m)});render()}
function setCat(c){currentCat=c;render()}

function render(){
const content=document.getElementById(‘content’),tabs=document.getElementById(‘tabs’);
if(currentMode===‘catalog’){
const cats={all:‘Все’,single:‘Моно’,powder:‘Порошки’,mix:‘Миксы’,spice:‘С приправами’};
tabs.innerHTML=Object.entries(cats).map(([k,v])=>`<div class="tab ${currentCat===k?'active':''}" onclick="setCat('${k}')">${v}</div>`).join(’’);
tabs.style.display=‘flex’;
renderCatalog(content);
}else if(currentMode===‘symptoms’){tabs.style.display=‘none’;renderSymptoms(content)}
else{tabs.style.display=‘none’;renderTips(content)}
}

function renderCatalog(el){
let teas=TEAS;
if(currentCat!==‘all’)teas=teas.filter(t=>t.cat===currentCat);
if(searchQuery){const q=searchQuery.toLowerCase();teas=teas.filter(t=>t.name.toLowerCase().includes(q)||t.desc.toLowerCase().includes(q)||t.symptoms.some(s=>s.includes(q))||t.benefits.some(b=>b.toLowerCase().includes(q)))}
if(!teas.length){el.innerHTML=’<div class="empty"><div class="em-icon">🔍</div><p>Ничего не найдено.<br>Попробуй другой запрос.</p></div>’;return}
el.innerHTML=teas.map(t=>`<div class="tea-card cat-${t.cat}" onclick="openDetail(${t.id})"><span class="emoji">${t.emoji}</span><div class="name">${t.name}</div><span class="form-tag">${t.form}</span><div class="desc">${t.desc}</div><div class="tags">${t.symptoms.slice(0,4).map(s=>`<span class="tag">${s}</span>`).join('')}</div></div>`).join(’’)+’<div class="disclaimer">⚠️ Чай — дополнение к лечению, не замена. Консультируйтесь с врачом.</div>’;
}

function renderSymptoms(el){
let h=’<div class="symptom-grid">’+SYMPTOMS.map(s=>`<div class="symptom-btn ${activeSymptoms.includes(s.id)?'active':''}" onclick="toggleSymptom('${s.id}')"><span class="sym-emoji">${s.emoji}</span><div class="sym-name">${s.name}</div></div>`).join(’’)+’</div>’;
if(activeSymptoms.length){
const matched=TEAS.filter(t=>t.symptoms.some(s=>activeSymptoms.includes(s))).sort((a,b)=>b.symptoms.filter(s=>activeSymptoms.includes(s)).length-a.symptoms.filter(s=>activeSymptoms.includes(s)).length);
if(matched.length){h+=’<div style="margin-top:14px">’+matched.map(t=>{const mc=t.symptoms.filter(s=>activeSymptoms.includes(s)).length;return`<div class="match-card" onclick="openDetail(${t.id})"><div class="match-top"><span class="match-name">${t.emoji} ${t.name}</span><span class="match-badge">${mc} совпад.</span></div><div class="match-desc">${t.desc}</div></div>`}).join(’’)+’</div>’}
}else{h+=’<div class="empty" style="padding:24px"><p>Выбери симптом —<br>подберу подходящий чай</p></div>’}
el.innerHTML=h;
}

function toggleSymptom(id){const i=activeSymptoms.indexOf(id);if(i>-1)activeSymptoms.splice(i,1);else activeSymptoms.push(id);render()}

function renderTips(el){
el.innerHTML=SELL_TIPS.map(s=>`<div class="tip-card"><span class="tip-emoji">${s.emoji}</span><div class="tip-title">${s.title}</div>${s.tips.map(t=>`<div class="tip-item">${t}</div>`).join('')}</div>`).join(’’)+’<div class="disclaimer">Помни: ты продавец, не врач!</div>’;
}

function openDetail(id){
const t=TEAS.find(x=>x.id===id);if(!t)return;
document.getElementById(‘detailSheet’).innerHTML=` <div class="detail-handle"></div> <div class="detail-header"><span class="emoji">${t.emoji}</span><h2>${t.name}</h2><div class="form">${t.form}</div></div> <div class="detail-body"> <div class="detail-section"><h3>Описание</h3><p>${t.desc}</p></div> <div class="detail-section"><h3>✦ Полезные свойства</h3><ul class="benefit-list">${t.benefits.map(b=>`<li>${b}</li>`).join('')}</ul></div> <div class="detail-section"><h3>☕ Как заваривать</h3><div class="brew-box"><div class="brew-row"><span class="brew-label">Температура</span><span class="brew-val">${t.brew.temp}</span></div><div class="brew-row"><span class="brew-label">Дозировка</span><span class="brew-val">${t.brew.amount}</span></div><div class="brew-row"><span class="brew-label">Время</span><span class="brew-val">${t.brew.time}</span></div><div class="brew-row"><span class="brew-label">Повтор</span><span class="brew-val">${t.brew.reuse}</span></div></div></div> <div class="detail-section"><h3>🔗 Сочетания</h3><ul>${t.combos.map(c=>`<li>${c}</li>`).join('')}</ul></div> <div class="detail-section"><h3>⚠️ Противопоказания</h3><ul class="warn-list">${t.contra.map(c=>`<li>${c}</li>`).join('')}</ul></div> <div class="detail-section"><h3>💰 Совет продавцу</h3><div class="sell-tip">${t.sell}</div></div> <button class="close-btn" onclick="closeDetail()">Закрыть</button> </div>`;
document.getElementById(‘detailOverlay’).classList.add(‘show’);
document.getElementById(‘detailSheet’).scrollTop=0;
}

function closeDetail(e){if(e&&e.target!==document.getElementById(‘detailOverlay’))return;document.getElementById(‘detailOverlay’).classList.remove(‘show’)}

document.getElementById(‘searchInput’).addEventListener(‘input’,function(e){searchQuery=e.target.value.trim();document.getElementById(‘clearBtn’).style.display=searchQuery?‘block’:‘none’;if(currentMode===‘catalog’)render()});
function clearSearch(){document.getElementById(‘searchInput’).value=’’;searchQuery=’’;document.getElementById(‘clearBtn’).style.display=‘none’;render()}
document.addEventListener(‘dblclick’,e=>e.preventDefault());
render();
</script>
