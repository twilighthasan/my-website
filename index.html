<!DOCTYPE html>

<html lang="ru">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width,initial-scale=1,maximum-scale=1,user-scalable=no">
<title>НотПад — Совместные заметки</title>
<style>
* { margin:0; padding:0; box-sizing:border-box; -webkit-tap-highlight-color:transparent; }
:root {
  --bg: #0f0f14;
  --surface: #1a1a24;
  --surface2: #22223a;
  --accent: #6c5ce7;
  --accent2: #a29bfe;
  --text: #e8e8f0;
  --text2: #8888aa;
  --danger: #e74c3c;
  --success: #2ecc71;
  --border: #2a2a44;
  --radius: 14px;
}
body {
  font-family: -apple-system, BlinkMacSystemFont, 'Segoe UI', Roboto, sans-serif;
  background: var(--bg);
  color: var(--text);
  width: 100%; height: 100vh; overflow: hidden;
  display: flex; flex-direction: column;
  touch-action: manipulation;
}

/* Header */
.header {
display: flex; align-items: center; justify-content: space-between;
padding: 12px 16px;
background: var(–surface);
border-bottom: 1px solid var(–border);
min-height: 56px;
flex-shrink: 0;
}
.header-title {
font-size: 18px; font-weight: 700;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
}
.header-room {
font-size: 12px; color: var(–text2); margin-top: 2px;
}
.header-actions { display: flex; gap: 8px; }
.icon-btn {
width: 44px; height: 44px;
border: none; border-radius: 12px;
background: var(–surface2);
color: var(–text);
font-size: 20px;
display: flex; align-items: center; justify-content: center;
cursor: pointer;
transition: all .15s;
position: relative;
}
.icon-btn:active { transform: scale(0.92); background: var(–accent); }
.icon-btn .badge {
position: absolute; top: 4px; right: 4px;
width: 8px; height: 8px;
background: var(–success);
border-radius: 50%;
}

/* Status bar */
.status-bar {
display: flex; align-items: center; gap: 8px;
padding: 6px 16px;
background: var(–surface);
font-size: 12px; color: var(–text2);
flex-shrink: 0;
}
.status-dot {
width: 8px; height: 8px; border-radius: 50%;
background: var(–success);
flex-shrink: 0;
}
.status-dot.offline { background: var(–danger); }
.status-dot.syncing { background: #f39c12; animation: pulse 1s infinite; }
@keyframes pulse { 0%,100% { opacity: 1; } 50% { opacity: 0.3; } }

/* Tabs */
.tabs {
display: flex;
background: var(–surface);
border-bottom: 1px solid var(–border);
flex-shrink: 0;
}
.tab {
flex: 1;
padding: 12px;
text-align: center;
font-size: 14px; font-weight: 600;
color: var(–text2);
border: none; background: none;
cursor: pointer;
position: relative;
transition: color .2s;
}
.tab.active { color: var(–accent2); }
.tab.active::after {
content: ‘’;
position: absolute; bottom: 0; left: 20%; right: 20%;
height: 3px; border-radius: 3px;
background: linear-gradient(90deg, var(–accent), var(–accent2));
}

/* Content area */
.content { flex: 1; overflow: hidden; position: relative; }

/* Editor panel */
.panel { display: none; width: 100%; height: 100%; flex-direction: column; }
.panel.active { display: flex; }

#editor {
flex: 1;
width: 100%;
padding: 16px;
background: var(–bg);
border: none;
color: var(–text);
font-size: 16px;
line-height: 1.6;
resize: none;
outline: none;
font-family: inherit;
}

/* Bottom bar */
.bottom-bar {
display: flex; align-items: center; gap: 8px;
padding: 10px 16px;
background: var(–surface);
border-top: 1px solid var(–border);
flex-shrink: 0;
}
.save-btn {
flex: 1; height: 48px;
border: none; border-radius: 12px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff;
font-size: 16px; font-weight: 700;
cursor: pointer;
transition: all .15s;
}
.save-btn:active { transform: scale(0.96); opacity: 0.85; }

/* History panel */
.history-list {
flex: 1; overflow-y: auto; padding: 12px 16px;
-webkit-overflow-scrolling: touch;
}
.history-item {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px;
margin-bottom: 10px;
cursor: pointer;
transition: all .15s;
}
.history-item:active { background: var(–surface2); transform: scale(0.98); }
.history-meta {
display: flex; justify-content: space-between; align-items: center;
margin-bottom: 8px;
}
.history-author {
font-size: 14px; font-weight: 600; color: var(–accent2);
}
.history-date {
font-size: 12px; color: var(–text2);
}
.history-preview {
font-size: 13px; color: var(–text2);
line-height: 1.4;
max-height: 42px; overflow: hidden;
text-overflow: ellipsis;
}
.history-empty {
text-align: center; color: var(–text2);
padding: 60px 20px; font-size: 15px;
}

/* Users panel */
.users-panel { padding: 16px; overflow-y: auto; }
.user-card {
background: var(–surface);
border: 1px solid var(–border);
border-radius: var(–radius);
padding: 14px;
margin-bottom: 10px;
display: flex; align-items: center; gap: 12px;
}
.user-avatar {
width: 44px; height: 44px;
border-radius: 50%;
display: flex; align-items: center; justify-content: center;
font-size: 20px; font-weight: 700;
color: #fff;
flex-shrink: 0;
}
.user-info { flex: 1; }
.user-name { font-size: 15px; font-weight: 600; }
.user-status { font-size: 12px; color: var(–text2); margin-top: 2px; }

/* Login screen */
.login-screen {
position: absolute; inset: 0;
background: var(–bg);
display: flex; flex-direction: column;
justify-content: center; align-items: center;
padding: 24px;
z-index: 100;
}
.login-screen.hidden { display: none; }
.login-logo {
font-size: 48px; margin-bottom: 8px;
}
.login-title {
font-size: 28px; font-weight: 800;
background: linear-gradient(135deg, var(–accent), var(–accent2));
-webkit-background-clip: text; -webkit-text-fill-color: transparent;
margin-bottom: 6px;
}
.login-sub {
font-size: 14px; color: var(–text2);
margin-bottom: 32px; text-align: center;
}
.input-group {
width: 100%; max-width: 340px; margin-bottom: 14px;
}
.input-label {
font-size: 13px; color: var(–text2);
margin-bottom: 6px; display: block;
}
.input-field {
width: 100%; height: 52px;
padding: 0 16px;
background: var(–surface);
border: 2px solid var(–border);
border-radius: 12px;
color: var(–text);
font-size: 16px;
outline: none;
transition: border-color .2s;
}
.input-field:focus { border-color: var(–accent); }
.login-btn {
width: 100%; max-width: 340px; height: 52px;
border: none; border-radius: 12px;
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff;
font-size: 17px; font-weight: 700;
cursor: pointer;
margin-top: 10px;
transition: all .15s;
}
.login-btn:active { transform: scale(0.96); }

/* Version detail modal */
.modal-overlay {
position: fixed; inset: 0;
background: rgba(0,0,0,0.7);
display: flex; align-items: flex-end;
z-index: 200;
opacity: 0; pointer-events: none;
transition: opacity .2s;
}
.modal-overlay.active { opacity: 1; pointer-events: auto; }
.modal-content {
width: 100%;
max-height: 75vh;
background: var(–surface);
border-radius: 20px 20px 0 0;
padding: 20px 16px 30px;
transform: translateY(100%);
transition: transform .3s ease;
display: flex; flex-direction: column;
}
.modal-overlay.active .modal-content { transform: translateY(0); }
.modal-handle {
width: 40px; height: 4px;
background: var(–border);
border-radius: 2px;
margin: 0 auto 16px;
}
.modal-title {
font-size: 18px; font-weight: 700; margin-bottom: 4px;
}
.modal-date {
font-size: 13px; color: var(–text2); margin-bottom: 14px;
}
.modal-text {
flex: 1; overflow-y: auto;
background: var(–bg);
border-radius: 12px;
padding: 14px;
font-size: 14px; line-height: 1.6;
color: var(–text2);
margin-bottom: 14px;
white-space: pre-wrap; word-break: break-word;
-webkit-overflow-scrolling: touch;
}
.modal-actions { display: flex; gap: 10px; }
.modal-actions button {
flex: 1; height: 48px;
border: none; border-radius: 12px;
font-size: 15px; font-weight: 700;
cursor: pointer;
transition: all .15s;
}
.modal-actions button:active { transform: scale(0.96); }
.btn-restore {
background: linear-gradient(135deg, var(–accent), var(–accent2));
color: #fff;
}
.btn-close-modal {
background: var(–surface2);
color: var(–text);
}

/* Toast */
.toast {
position: fixed; top: 70px; left: 50%; transform: translateX(-50%) translateY(-20px);
padding: 10px 20px;
border-radius: 12px;
font-size: 14px; font-weight: 600;
opacity: 0; pointer-events: none;
transition: all .3s;
z-index: 300;
white-space: nowrap;
}
.toast.show { opacity: 1; transform: translateX(-50%) translateY(0); }
.toast.success { background: var(–success); color: #fff; }
.toast.info { background: var(–accent); color: #fff; }
.toast.error { background: var(–danger); color: #fff; }
</style>

</head>
<body>

<!-- Login -->

<div class="login-screen" id="loginScreen">
  <div class="login-logo">📝</div>
  <div class="login-title">НотПад</div>
  <div class="login-sub">Совместные заметки с историей версий</div>
  <div class="input-group">
    <label class="input-label">Ваше имя</label>
    <input class="input-field" id="inputName" placeholder="Например: Хасан" autocomplete="off">
  </div>
  <div class="input-group">
    <label class="input-label">Код комнаты</label>
    <input class="input-field" id="inputRoom" placeholder="Например: семья" autocomplete="off">
  </div>
  <button class="login-btn" id="loginBtn">Войти</button>
</div>

<!-- Main app -->

<div class="header">
  <div>
    <div class="header-title">📝 НотПад</div>
    <div class="header-room" id="roomLabel"></div>
  </div>
  <div class="header-actions">
    <button class="icon-btn" id="shareBtn" title="Поделиться">🔗</button>
    <button class="icon-btn" id="logoutBtn" title="Выйти">🚪</button>
  </div>
</div>

<div class="status-bar">
  <div class="status-dot" id="statusDot"></div>
  <span id="statusText">Подключение...</span>
</div>

<div class="tabs">
  <button class="tab active" data-tab="editor">📄 Заметка</button>
  <button class="tab" data-tab="history">🕐 История</button>
  <button class="tab" data-tab="users">👥 Участники</button>
</div>

<div class="content">
  <!-- Editor -->
  <div class="panel active" id="panelEditor">
    <textarea id="editor" placeholder="Начните печатать..."></textarea>
    <div class="bottom-bar">
      <button class="save-btn" id="saveBtn">💾 Сохранить в историю</button>
    </div>
  </div>

  <!-- History -->

  <div class="panel" id="panelHistory">
    <div class="history-list" id="historyList">
      <div class="history-empty">Пока нет сохранённых версий</div>
    </div>
  </div>

  <!-- Users -->

  <div class="panel" id="panelUsers">
    <div class="users-panel" id="usersList"></div>
  </div>
</div>

<!-- Version detail modal -->

<div class="modal-overlay" id="modalOverlay">
  <div class="modal-content">
    <div class="modal-handle"></div>
    <div class="modal-title" id="modalAuthor"></div>
    <div class="modal-date" id="modalDate"></div>
    <div class="modal-text" id="modalText"></div>
    <div class="modal-actions">
      <button class="btn-close-modal" id="modalClose">Закрыть</button>
      <button class="btn-restore" id="modalRestore">♻️ Восстановить</button>
    </div>
  </div>
</div>

<div class="toast" id="toast"></div>

<script>
// ========== CONFIG ==========
const SYNC_INTERVAL = 5000;    // Poll every 5s
const AUTOSAVE_DELAY = 3000;   // After typing stops
const COLORS = ['#6c5ce7','#e74c3c','#2ecc71','#f39c12','#e84393','#00cec9','#fd79a8','#636e72'];

// ========== STATE ==========
let userName = '';
let roomCode = '';
let currentText = '';
let lastSyncedText = '';
let autosaveTimer = null;
let syncTimer = null;
let selectedVersion = null;
let isOnline = true;

// ========== STORAGE HELPERS ==========
function roomKey(suffix) {
  return `notepad:${roomCode}:${suffix}`;
}

async function storageGet(key, shared = true) {
  try {
    const r = await window.storage.get(key, shared);
    return r ? r.value : null;
  } catch { return null; }
}

async function storageSet(key, value, shared = true) {
  try {
    await window.storage.set(key, value, shared);
    return true;
  } catch { return false; }
}

// ========== INIT ==========
function init() {
  const saved = localStorage.getItem('notepad_session');
  if (saved) {
    try {
      const s = JSON.parse(saved);
      if (s.name && s.room) {
        userName = s.name;
        roomCode = s.room;
        enterRoom();
        return;
      }
    } catch {}
  }
  document.getElementById('loginScreen').classList.remove('hidden');
}

// ========== LOGIN ==========
document.getElementById('loginBtn').addEventListener('click', () => {
  const name = document.getElementById('inputName').value.trim();
  const room = document.getElementById('inputRoom').value.trim().toLowerCase();
  if (!name) { showToast('Введите имя', 'error'); return; }
  if (!room) { showToast('Введите код комнаты', 'error'); return; }
  userName = name;
  roomCode = room;
  localStorage.setItem('notepad_session', JSON.stringify({ name, room }));
  enterRoom();
});

async function enterRoom() {
  document.getElementById('loginScreen').classList.add('hidden');
  document.getElementById('roomLabel').textContent = `Комната: ${roomCode}`;
  setStatus('syncing', 'Синхронизация...');

  // Load current text
  const text = await storageGet(roomKey('text'));
  if (text !== null) {
    try {
      const data = JSON.parse(text);
      currentText = data.text || '';
    } catch {
      currentText = text;
    }
  } else {
    currentText = '';
  }
  lastSyncedText = currentText;
  document.getElementById('editor').value = currentText;

  // Register user presence
  await registerPresence();

  setStatus('online', 'Подключено');
  showToast('Вы в комнате «' + roomCode + '»', 'success');

  // Start sync loop
  startSync();
  loadHistory();
  loadUsers();
}

// ========== PRESENCE ==========
async function registerPresence() {
  const key = roomKey('users');
  let users = {};
  const raw = await storageGet(key);
  if (raw) { try { users = JSON.parse(raw); } catch {} }
  users[userName] = {
    name: userName,
    lastSeen: Date.now(),
    color: COLORS[userName.length % COLORS.length]
  };
  await storageSet(key, JSON.stringify(users));
}

// ========== SYNC ==========
function startSync() {
  if (syncTimer) clearInterval(syncTimer);
  syncTimer = setInterval(async () => {
    await registerPresence();
    await pullText();
    await loadHistory();
    await loadUsers();
  }, SYNC_INTERVAL);
}

async function pullText() {
  const raw = await storageGet(roomKey('text'));
  if (raw === null) return;
  let remoteText = '';
  let remoteTime = 0;
  try {
    const data = JSON.parse(raw);
    remoteText = data.text || '';
    remoteTime = data.time || 0;
  } catch {
    remoteText = raw;
  }

  const editor = document.getElementById('editor');
  const localText = editor.value;

  // If remote changed and local hasn't been edited since last sync
  if (remoteText !== lastSyncedText && localText === lastSyncedText) {
    editor.value = remoteText;
    currentText = remoteText;
    lastSyncedText = remoteText;
    setStatus('online', 'Обновлено');
  } else if (localText !== lastSyncedText && remoteText !== lastSyncedText) {
    // Conflict — local wins, but we show a notice
    setStatus('online', '⚠️ Конфликт — ваш текст сохранён');
  } else {
    lastSyncedText = remoteText;
  }
}

async function pushText(text) {
  const data = JSON.stringify({ text, time: Date.now(), author: userName });
  const ok = await storageSet(roomKey('text'), data);
  if (ok) {
    lastSyncedText = text;
    setStatus('online', 'Сохранено');
  } else {
    setStatus('offline', 'Ошибка сохранения');
  }
}

// ========== EDITOR ==========
const editor = document.getElementById('editor');
editor.addEventListener('input', () => {
  currentText = editor.value;
  setStatus('syncing', 'Печатает...');
  if (autosaveTimer) clearTimeout(autosaveTimer);
  autosaveTimer = setTimeout(async () => {
    await pushText(currentText);
  }, AUTOSAVE_DELAY);
});

// ========== SAVE TO HISTORY ==========
document.getElementById('saveBtn').addEventListener('click', async () => {
  const text = editor.value.trim();
  if (!text) { showToast('Нечего сохранять', 'error'); return; }
  await saveVersion(text);
  await pushText(text);
  showToast('Версия сохранена ✓', 'success');
  loadHistory();
});

async function saveVersion(text) {
  const key = roomKey('history');
  let history = [];
  const raw = await storageGet(key);
  if (raw) { try { history = JSON.parse(raw); } catch {} }

  history.unshift({
    id: Date.now(),
    author: userName,
    text: text,
    time: Date.now()
  });

  // Keep max 50 versions
  if (history.length > 50) history = history.slice(0, 50);
  await storageSet(key, JSON.stringify(history));
}

// ========== HISTORY ==========
async function loadHistory() {
  const key = roomKey('history');
  const raw = await storageGet(key);
  let history = [];
  if (raw) { try { history = JSON.parse(raw); } catch {} }

  const list = document.getElementById('historyList');
  if (history.length === 0) {
    list.innerHTML = '<div class="history-empty">Пока нет сохранённых версий<br><br>Нажмите 💾 чтобы сохранить текущую версию</div>';
    return;
  }

  list.innerHTML = history.map((v, i) => {
    const d = new Date(v.time);
    const dateStr = d.toLocaleDateString('ru-RU', { day:'numeric', month:'short' }) + ' ' +
                    d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
    const preview = (v.text || '').substring(0, 100).replace(/\n/g, ' ');
    return `<div class="history-item" data-idx="${i}">
      <div class="history-meta">
        <span class="history-author">${escapeHtml(v.author)}</span>
        <span class="history-date">${dateStr}</span>
      </div>
      <div class="history-preview">${escapeHtml(preview)}${v.text.length > 100 ? '...' : ''}</div>
    </div>`;
  }).join('');

  // Store for modal
  list._history = history;

  list.querySelectorAll('.history-item').forEach(el => {
    el.addEventListener('click', () => {
      const idx = parseInt(el.dataset.idx);
      const v = list._history[idx];
      if (v) openModal(v);
    });
  });
}

// ========== USERS ==========
async function loadUsers() {
  const key = roomKey('users');
  const raw = await storageGet(key);
  let users = {};
  if (raw) { try { users = JSON.parse(raw); } catch {} }

  const container = document.getElementById('usersList');
  const entries = Object.values(users).sort((a, b) => b.lastSeen - a.lastSeen);

  if (entries.length === 0) {
    container.innerHTML = '<div class="history-empty">Нет участников</div>';
    return;
  }

  const now = Date.now();
  container.innerHTML = entries.map(u => {
    const ago = now - u.lastSeen;
    const online = ago < 15000;
    const statusTxt = online ? 'Онлайн' :
      ago < 60000 ? 'Был(а) только что' :
      ago < 3600000 ? `Был(а) ${Math.floor(ago/60000)} мин. назад` :
      `Был(а) ${Math.floor(ago/3600000)} ч. назад`;
    const initial = (u.name || '?')[0].toUpperCase();
    return `<div class="user-card">
      <div class="user-avatar" style="background:${u.color || '#6c5ce7'}">${initial}</div>
      <div class="user-info">
        <div class="user-name">${escapeHtml(u.name)}${u.name === userName ? ' (вы)' : ''}</div>
        <div class="user-status">${online ? '🟢' : '⚪'} ${statusTxt}</div>
      </div>
    </div>`;
  }).join('');
}

// ========== MODAL ==========
function openModal(version) {
  selectedVersion = version;
  document.getElementById('modalAuthor').textContent = version.author;
  const d = new Date(version.time);
  document.getElementById('modalDate').textContent =
    d.toLocaleDateString('ru-RU', { day:'numeric', month:'long', year:'numeric' }) + ', ' +
    d.toLocaleTimeString('ru-RU', { hour:'2-digit', minute:'2-digit' });
  document.getElementById('modalText').textContent = version.text;
  document.getElementById('modalOverlay').classList.add('active');
}

document.getElementById('modalClose').addEventListener('click', () => {
  document.getElementById('modalOverlay').classList.remove('active');
});

document.getElementById('modalRestore').addEventListener('click', async () => {
  if (!selectedVersion) return;
  editor.value = selectedVersion.text;
  currentText = selectedVersion.text;
  await pushText(currentText);
  document.getElementById('modalOverlay').classList.remove('active');
  switchTab('editor');
  showToast('Версия восстановлена ✓', 'success');
});

document.getElementById('modalOverlay').addEventListener('click', (e) => {
  if (e.target === e.currentTarget) {
    document.getElementById('modalOverlay').classList.remove('active');
  }
});

// ========== TABS ==========
document.querySelectorAll('.tab').forEach(tab => {
  tab.addEventListener('click', () => switchTab(tab.dataset.tab));
});

function switchTab(name) {
  document.querySelectorAll('.tab').forEach(t => t.classList.toggle('active', t.dataset.tab === name));
  document.querySelectorAll('.panel').forEach(p => p.classList.toggle('active', p.id === 'panel' + name.charAt(0).toUpperCase() + name.slice(1)));
  if (name === 'history') loadHistory();
  if (name === 'users') loadUsers();
}

// ========== SHARE ==========
document.getElementById('shareBtn').addEventListener('click', () => {
  const text = `Присоединяйся к заметке!\nКод комнаты: ${roomCode}\nОткрой НотПад и введи этот код.`;
  if (navigator.share) {
    navigator.share({ title: 'НотПад', text }).catch(() => {});
  } else {
    navigator.clipboard.writeText(text).then(() => showToast('Скопировано!', 'info'));
  }
});

// ========== LOGOUT ==========
document.getElementById('logoutBtn').addEventListener('click', () => {
  if (syncTimer) clearInterval(syncTimer);
  if (autosaveTimer) clearTimeout(autosaveTimer);
  localStorage.removeItem('notepad_session');
  userName = '';
  roomCode = '';
  editor.value = '';
  currentText = '';
  lastSyncedText = '';
  document.getElementById('loginScreen').classList.remove('hidden');
  switchTab('editor');
});

// ========== UTILS ==========
function setStatus(state, text) {
  const dot = document.getElementById('statusDot');
  dot.className = 'status-dot ' + (state === 'syncing' ? 'syncing' : state === 'offline' ? 'offline' : '');
  document.getElementById('statusText').textContent = text;
  isOnline = state !== 'offline';
}

function showToast(msg, type = 'info') {
  const t = document.getElementById('toast');
  t.textContent = msg;
  t.className = 'toast ' + type + ' show';
  setTimeout(() => t.classList.remove('show'), 2500);
}

function escapeHtml(str) {
  const div = document.createElement('div');
  div.textContent = str;
  return div.innerHTML;
}

// ========== START ==========
init();
</script>
